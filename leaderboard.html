<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SHC-1999-n Fifa 2026 - Leaderboard</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚽</text></svg>">
<style>
  :root{
    --bg:#050f1d; --card:#102d47; --card2:#1a4368; --line:#2d6594;
    --text:#ffffff; --muted:#9fc4e8; --accent:#00ff9d; --accent2:#ff4d4d;
    --gold:#ffd700; --silver:#e8eef5; --bronze:#ff9f4d;
    --header-grad: linear-gradient(135deg, #003366 0%, #00d97e 100%);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color: transparent;}
  body{
    margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg); color:var(--text); padding-bottom:40px;
  }
  .wrap{max-width:480px; margin:0 auto; padding:12px;}
  header{
    text-align:center; padding:20px 12px; margin:8px 0 16px;
    background:var(--header-grad); border-radius:16px;
    border:2px solid var(--accent); box-shadow:0 0 24px rgba(0,255,157,0.35);
  }
  h1{font-size:23px; margin:0; font-weight:900; letter-spacing:0.5px;
     text-shadow:0 2px 8px rgba(0,0,0,0.4);}
  .subtitle{font-size:12.5px; color:#dff5ea; margin-top:6px; font-style:italic; font-weight:600;}
  .refresh-row{
    display:flex; justify-content:center; margin:10px 0 16px;
  }
  .refresh-row button{
    background:var(--accent); color:var(--bg); border:none;
    border-radius:12px; padding:10px 22px; font-size:13px; font-weight:800;
    box-shadow:0 2px 10px rgba(0,255,157,0.4);
  }
  .lb-table{
    width:100%; border-collapse:collapse; background:var(--card);
    border:2px solid var(--accent); border-radius:14px; overflow:hidden;
    box-shadow:0 4px 20px rgba(0,0,0,0.4);
  }
  .lb-table th, .lb-table td{
    padding:8px 2px; text-align:center; border-bottom:1px solid var(--line); font-size:11px;
  }
  .lb-table th{
    background:var(--header-grad); color:#ffffff; font-size:9.5px;
    text-transform:uppercase; letter-spacing:0.3px; line-height:1.3; font-weight:800;
    padding:10px 2px;
  }
  .lb-table tbody tr:nth-child(odd){ background:rgba(255,255,255,0.03); }
  .lb-table tbody tr:hover{ background:rgba(0,255,157,0.08); }
  .lb-table td.name{ text-align:left; font-weight:800; font-size:12.5px; padding-left:8px; }
  .lb-table td.points{ font-weight:900; font-size:14px; }
  .rank-cell{ font-weight:900; font-size:13px; }
  .rank-1{ color:var(--gold); text-shadow:0 0 8px rgba(255,215,0,0.6); }
  .rank-2{ color:var(--silver); }
  .rank-3{ color:var(--bronze); }
  .lb-table tbody tr:nth-child(1){ background:rgba(255,215,0,0.12); }
  .lb-table tbody tr:nth-child(2){ background:rgba(232,238,245,0.08); }
  .lb-table tbody tr:nth-child(3){ background:rgba(255,159,77,0.10); }
  .pos{ color:var(--accent); }
  .neg{ color:var(--accent2); }
  .status{
    text-align:center; font-size:12px; color:var(--muted); margin-top:14px; min-height:16px;
  }
  .loading{
    text-align:center; padding:40px 0; color:var(--muted); font-size:13px;
  }
  .legend{
    background:var(--card); border:1px solid var(--line); border-radius:12px;
    padding:12px 14px; margin-top:14px; font-size:11.5px; color:var(--muted); line-height:1.7;
  }
  .legend b{ color:var(--accent); font-size:12.5px; }
  .legend .pos{ color:var(--accent); font-weight:800; }
  .legend .neu{ color:#4dabf7; font-weight:800; }
  .legend .neg{ color:var(--accent2); font-weight:800; }
  .move{ font-size:11px; margin-left:3px; font-weight:900; }
  .move-up{ color:var(--accent); }
  .move-down{ color:var(--accent2); }
  .move-same{ color:var(--muted); }
  .lastresult{
    background:var(--header-grad); border:2px solid var(--accent); border-radius:16px;
    padding:16px 14px; margin-bottom:14px; text-align:center;
    box-shadow:0 0 20px rgba(0,255,157,0.25);
  }
  .lastresult .lr-title{
    font-size:12px; font-weight:900; color:#ffffff; margin-bottom:10px;
    text-transform:uppercase; letter-spacing:1px; text-shadow:0 1px 4px rgba(0,0,0,0.3);
  }
  .lastresult .lr-score{
    display:flex; align-items:center; justify-content:center; gap:14px; font-size:22px; font-weight:900;
    color:#ffffff; text-shadow:0 2px 6px rgba(0,0,0,0.3);
  }
  .lastresult .lr-team{ display:flex; flex-direction:column; align-items:center; gap:6px; font-size:13px; font-weight:800; color:#ffffff; }
  .lastresult .flag{ font-size:32px; filter:drop-shadow(0 2px 4px rgba(0,0,0,0.3)); }
  .tidbits{
    display:grid; grid-template-columns:repeat(3, 1fr); gap:8px; margin-bottom:14px;
  }
  .tidbit{
    background:var(--card); border:2px solid var(--line); border-radius:12px;
    padding:12px 6px; text-align:center; transition:border-color 0.2s;
  }
  .tidbit:nth-child(1){ border-color:var(--gold); box-shadow:0 0 12px rgba(255,215,0,0.2); }
  .tidbit:nth-child(2){ border-color:var(--accent2); box-shadow:0 0 12px rgba(255,77,77,0.2); }
  .tidbit:nth-child(3){ border-color:var(--muted); }
  .tidbit .tb-label{ font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:0.3px; margin-bottom:6px; font-weight:700; }
  .tidbit .tb-name{ font-size:14px; font-weight:900; color:var(--text); }
  .tidbit .tb-sub{ font-size:10.5px; color:var(--accent); margin-top:4px; font-weight:700; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>🏆 SHC-1999-n FIFA 2026</h1>
    <div class="subtitle">⚡ Trust in God and do the right ⚡</div>
  </header>

  <div style="text-align:center; margin-bottom:14px;">
    <a href="index.html" style="display:inline-block; background:var(--card2); color:var(--text); border:1px solid var(--line); border-radius:12px; padding:8px 18px; font-size:12.5px; font-weight:700; text-decoration:none;">⬅ Back to Predictions</a>
  </div>

  <div id="lastResultBox"></div>

  <div id="tidbitsBox"></div>

  <div class="refresh-row">
    <button onclick="loadLeaderboard()">🔄 Refresh</button>
  </div>

  <div id="content">
    <div class="loading">Loading leaderboard...</div>
  </div>

  <div class="legend">
    <b>Points system:</b><br>
    <span class="pos">Exact score</span> = +5 &middot;
    <span class="neu">Correct result</span> (win/draw/loss) = +2 &middot;
    <span class="neg">Wrong result</span> = -1 &middot; no prediction = 0<br>
    <span class="move-up">&#8593;</span> / <span class="move-down">&#8595;</span> next to rank shows movement since your last refresh.
  </div>

  <div class="status" id="status"></div>
</div>

<script>
const ENDPOINT = "https://script.google.com/macros/s/AKfycbxC_Xsx_0ffVWpJRZOLXIS0Kr6H9MST4QMw8wBEuGJSifTebg22Qpl4SDsX4BMexM8/exec";

const FLAGS = {
  "Mexico":"🇲🇽","South Africa":"🇿🇦","South Korea":"🇰🇷","Czechia":"🇨🇿","Canada":"🇨🇦",
  "Bosnia & Herzegovina":"🇧🇦","Bosnia and Herzegovina":"🇧🇦","USA":"🇺🇸","United States":"🇺🇸","Paraguay":"🇵🇾",
  "Qatar":"🇶🇦","Switzerland":"🇨🇭","Brazil":"🇧🇷","Morocco":"🇲🇦","Haiti":"🇭🇹","Scotland":"🏴",
  "Australia":"🇦🇺","Turkey":"🇹🇷","Turkiye":"🇹🇷","Germany":"🇩🇪","Curaçao":"🇨🇼","Netherlands":"🇳🇱",
  "Japan":"🇯🇵","Ivory Coast":"🇨🇮","Ecuador":"🇪🇨","Sweden":"🇸🇪","Tunisia":"🇹🇳","Spain":"🇪🇸",
  "Cape Verde":"🇨🇻","Belgium":"🇧🇪","Egypt":"🇪🇬","Saudi Arabia":"🇸🇦","Uruguay":"🇺🇾","Iran":"🇮🇷",
  "New Zealand":"🇳🇿","France":"🇫🇷","Senegal":"🇸🇳","Iraq":"🇮🇶","Norway":"🇳🇴","Argentina":"🇦🇷",
  "Algeria":"🇩🇿","Austria":"🇦🇹","Jordan":"🇯🇴","Portugal":"🇵🇹","DR Congo":"🇨🇩","England":"🏴",
  "Croatia":"🇭🇷","Ghana":"🇬🇭","Panama":"🇵🇦","Uzbekistan":"🇺🇿","Colombia":"🇨🇴"
};
function flagFor(team){ return FLAGS[team] || "🏳️"; }

function renderLastResult(lastResult){
  const box = document.getElementById('lastResultBox');
  if(!lastResult){ box.innerHTML = ''; return; }
  box.innerHTML = `
    <div class="lastresult">
      <div class="lr-title">Updated after ${lastResult.matchId} result</div>
      <div class="lr-score">
        <div class="lr-team"><span class="flag">${flagFor(lastResult.home)}</span>${lastResult.home}</div>
        <div>${lastResult.actualHome} - ${lastResult.actualAway}</div>
        <div class="lr-team"><span class="flag">${flagFor(lastResult.away)}</span>${lastResult.away}</div>
      </div>
    </div>`;
}

const TIDBIT_SUBS = {
  mostlyCorrect: ["I know things 🧠"],
  mostlyWrong: ["Always wrong, never bent 😅"],
  leastPredictions: ["Ghost Mode 👻", "Where Were You? 🕵️", "Phantom Predictor 💨"]
};
function pickSub(key){
  const arr = TIDBIT_SUBS[key];
  return arr[Math.floor(Math.random()*arr.length)];
}

function renderTidbits(tidbits){
  const box = document.getElementById('tidbitsBox');
  if(!tidbits){ box.innerHTML = ''; return; }
  const items = [
    {label:"The Oracle Award", data:tidbits.mostlyCorrect, sub:pickSub('mostlyCorrect')},
    {label:"Incorrect & Incorrupt", data:tidbits.mostlyWrong, sub:pickSub('mostlyWrong')},
    {label:"Least Predictions", data:tidbits.leastPredictions, sub:pickSub('leastPredictions')}
  ];
  let html = '<div class="tidbits">';
  items.forEach(item=>{
    if(!item.data){ html += '<div class="tidbit"></div>'; return; }
    html += `<div class="tidbit">
      <div class="tb-label">${item.label}</div>
      <div class="tb-name">${item.data.name}</div>
      <div class="tb-sub">${item.sub}</div>
    </div>`;
  });
  html += '</div>';
  box.innerHTML = html;
}

async function loadLeaderboard(){
  const content = document.getElementById('content');
  const status = document.getElementById('status');
  content.innerHTML = '<div class="loading">Loading leaderboard...</div>';
  status.textContent = '';

  // Try direct fetch first
  try{
    const res = await fetch(ENDPOINT + '?type=leaderboard');
    const data = await res.json();
    if(data.status === 'ok'){
      renderTable(data.leaderboard);
      renderLastResult(data.lastResult);
      renderTidbits(data.tidbits);
      status.textContent = 'Last updated: ' + new Date().toLocaleTimeString();
      return;
    }
  }catch(e){
    // fall through to JSONP fallback below
  }

  // Fallback: JSONP-style via script tag (bypasses CORS restrictions)
  try{
    await loadViaJsonp();
  }catch(e2){
    content.innerHTML = '<div class="loading">Could not reach leaderboard. Check your connection and try again.</div>';
  }
}

function loadViaJsonp(){
  return new Promise((resolve, reject)=>{
    const callbackName = 'lbCallback_' + Date.now();
    const script = document.createElement('script');
    let settled = false;

    window[callbackName] = function(data){
      settled = true;
      if(data.status === 'ok'){
        renderTable(data.leaderboard);
        renderLastResult(data.lastResult);
        renderTidbits(data.tidbits);
        document.getElementById('status').textContent = 'Last updated: ' + new Date().toLocaleTimeString();
        resolve();
      } else {
        reject(new Error('bad response'));
      }
      delete window[callbackName];
      script.remove();
    };

    script.src = ENDPOINT + '?type=leaderboard&callback=' + callbackName;
    script.onerror = function(){
      if(!settled){
        delete window[callbackName];
        script.remove();
        reject(new Error('script load failed'));
      }
    };
    document.body.appendChild(script);

    setTimeout(()=>{
      if(!settled){
        delete window[callbackName];
        script.remove();
        reject(new Error('timeout'));
      }
    }, 8000);
  });
}

function renderTable(rows){
  // Load previous ranks for movement comparison
  let prevRanks = {};
  try{
    prevRanks = JSON.parse(localStorage.getItem('lbPrevRanks') || '{}');
  }catch(e){ prevRanks = {}; }

  let html = '<table class="lb-table"><thead><tr>' +
    '<th>#</th><th>Name</th><th>Exact Score</th><th>Correct Result</th><th>Wrong Result</th><th>No Prediction</th><th>Total Points</th>' +
    '</tr></thead><tbody>';

  const currentRanks = {};
  rows.forEach((r, i)=>{
    const rank = i+1;
    currentRanks[r.name] = rank;
    let rankClass = '';
    if(rank===1) rankClass = 'rank-1';
    else if(rank===2) rankClass = 'rank-2';
    else if(rank===3) rankClass = 'rank-3';
    const pointsClass = r.points < 0 ? 'neg' : 'pos';

    let moveHtml = '';
    if(prevRanks[r.name] !== undefined){
      const diff = prevRanks[r.name] - rank; // positive = moved up
      if(diff > 0) moveHtml = `<span class="move move-up">&#8593;${diff}</span>`;
      else if(diff < 0) moveHtml = `<span class="move move-down">&#8595;${Math.abs(diff)}</span>`;
      else moveHtml = `<span class="move move-same">&#8211;</span>`;
    }

    html += `<tr>
      <td class="rank-cell ${rankClass}">${rank}${moveHtml}</td>
      <td class="name">${r.name}</td>
      <td>${r.exact}</td>
      <td>${r.correct}</td>
      <td>${r.wrong}</td>
      <td>${r.noPred}</td>
      <td class="points ${pointsClass}">${r.points}</td>
    </tr>`;
  });

  html += '</tbody></table>';
  document.getElementById('content').innerHTML = html;

  // Save current ranks for next refresh's comparison
  try{
    localStorage.setItem('lbPrevRanks', JSON.stringify(currentRanks));
  }catch(e){}
}

loadLeaderboard();
</script>
</body>
</html>
