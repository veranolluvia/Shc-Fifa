<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SHC-1999-n FIFA 2026 — Leaderboard</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚽</text></svg>">
<style>
  :root{
    --yellow:#f5c518; --yellow-bg:#1a1200; --yellow-row:#1a1200; --yellow-text:#fef9c3; --yellow-dim:#92400e;
    --blue:#0ea5e9; --blue-bg:#0c1a24; --blue-text:#bae6fd; --blue-dim:#0369a1;
    --pink:#f472b6; --pink-bg:#1f0818; --pink-text:#fbcfe8; --pink-dim:#9d174d;
    --green:#22c55e; --green-bg:#0a1f10; --green-text:#86efac; --green-dim:#14532d;
  }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; margin:0; padding:0; }
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:#f5f5f5; color:#1a1a1a; min-height:100vh; padding-bottom:20px;
  }
  .wrap{ max-width:480px; margin:0 auto; padding:12px; }

  /* HEADER */
  .hdr{
    background:#0f2940; border:1px solid #2d5577; box-shadow:0 4px 16px rgba(0,0,0,0.3);
    border-radius:16px; padding:14px 12px 12px; margin-bottom:12px;
  }
  .hdr-top{
    display:flex; align-items:center; justify-content:space-between; gap:8px; margin-bottom:8px;
  }
  .hdr-btn{
    font-size:11px; font-weight:600; color:#f2f7fb; background:#163a57;
    border:1px solid #2d5577; border-radius:8px; padding:7px 9px;
    white-space:nowrap; cursor:pointer; text-decoration:none; display:inline-block;
  }
  .hdr-center{ text-align:center; flex:1; }
  .hdr-title{ font-size:16px; font-weight:800; color:#00d97e; }
  .hdr-result{ font-size:11px; color:#f2f7fb; margin-top:4px; line-height:1.5; }

  /* TIDBITS */
  .tidbits{ display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:12px; }
  .tidbit{ padding:10px 8px; text-align:center; border-radius:12px; background:#0f2940; border:1px solid #2d5577; }
  .t-blue{ border-top:3px solid #0ea5e9; }
  .t-pink{ border-top:3px solid #f472b6; }
  .t-green{ border-top:3px solid #22c55e; }
  .tb-label{ font-size:8.5px; font-weight:700; text-transform:uppercase; letter-spacing:0.4px; margin-bottom:4px; color:#a9c4dc; }
  .tb-name{ font-size:13px; font-weight:800; }
  .t-blue .tb-name{ color:#0ea5e9; }
  .t-pink .tb-name{ color:#f472b6; }
  .t-green .tb-name{ color:#00d97e; }
  .tb-sub{ font-size:9.5px; margin-top:3px; color:#a9c4dc; }

  /* TABLE */
  .lb-wrap{ border-radius:14px; overflow:hidden; border:1px solid #2d5577; box-shadow:0 4px 16px rgba(0,0,0,0.3); }
  .lb-table{ width:100%; border-collapse:collapse; font-size:12px; }
  .lb-table thead tr{ background:transparent; }
  .lb-table th{ padding:9px 4px; font-size:9px; font-weight:700; color:#1a1200; text-align:center; }
  .lb-table th.name{ text-align:left; padding-left:8px; }
  .lb-table td{ padding:9px 4px; text-align:center; }
  .lb-table td.name{ text-align:left; padding-left:8px; font-weight:600; }
  .lb-table td.pts{ font-weight:700; font-size:13px; color:#1e293b; }
  /* cycling row colours */
  .r-blue{ background:#e8f4fd; border-bottom:0.5px solid rgba(14,165,233,0.2); color:#075985; }
  .r-pink{ background:#fce7f3; border-bottom:0.5px solid rgba(244,114,182,0.2); color:#9d174d; }
  .r-green{ background:#e8f5e9; border-bottom:0.5px solid rgba(34,197,94,0.2); color:#166534; }
  .r-yellow{ background:#fffde7; border-bottom:0.5px solid rgba(245,197,24,0.2); color:#1e293b; }
  /* movement */
  .move{ font-size:10px; margin-left:2px; font-weight:700; }
  .mu{ color:#4ade80; } .md{ color:#f87171; } .ms{ color:#475569; }
  /* negative points */
  .pts-neg{ color:#dc2626!important; }

  /* ---------- FLIP ANIMATION ---------- */
  @keyframes row-scramble{
    0%  { transform:translateY(0) scaleY(1); opacity:1; }
    25% { transform:translateY(-8px) scaleY(0.85); opacity:0.6; }
    50% { transform:translateY(4px) scaleY(1.08); opacity:0.8; }
    75% { transform:translateY(-3px) scaleY(0.95); opacity:0.9; }
    100%{ transform:translateY(0) scaleY(1); opacity:1; }
  }
  .lb-table tbody tr.scrambling{
    animation: row-scramble 0.6s ease forwards;
  }
  .flip-msg{
    position:fixed; inset:0; z-index:500; display:flex;
    align-items:center; justify-content:center;
    background:rgba(26,18,0,0.85); pointer-events:none;
  }
  .flip-msg-inner{
    background:#fff; border-radius:18px; padding:22px 20px;
    max-width:280px; width:88%; text-align:center;
    box-shadow:0 8px 32px rgba(0,0,0,0.3);
    animation:flip-msg-pop 0.3s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes flip-msg-pop{
    0%{ transform:scale(0.5); opacity:0; }
    100%{ transform:scale(1); opacity:1; }
  }
  .flip-msg-emoji{ font-size:44px; margin-bottom:8px; display:block; }
  .flip-msg-text{ font-size:14px; font-weight:700; color:#1a1200; line-height:1.4; }
  .flip-hint{
    text-align:center; font-size:11px; color:#94a3b8; margin-top:6px;
    animation: hint-pulse 2.5s ease-in-out infinite;
  }
  @keyframes hint-pulse{
    0%,100%{ opacity:0.3; } 50%{ opacity:0.9; }
  }
  .legend{
    margin-top:10px; padding:9px 12px; border-radius:10px;
    background:#f8fafc; border:0.5px solid #94a3b8;
    font-size:10.5px; color:#a9c4dc; line-height:1.7;
  }

  /* STATUS */
  .status{ text-align:center; font-size:11px; color:#a9c4dc; margin-top:8px; }
  .loading{ text-align:center; padding:40px 0; color:#a9c4dc; font-size:13px; }

  /* PODIUM REVEAL */
  .podium-overlay{
    position:fixed; inset:0; z-index:600; display:none;
    align-items:center; justify-content:center;
    background:rgba(0,0,0,0.9); flex-direction:column;
  }
  .podium-overlay.show{ display:flex; }
  .podium-card{
    text-align:center; padding:32px 28px; border-radius:24px;
    max-width:300px; width:90%; border:2px solid;
    animation:pop 0.5s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes pop{
    0%{ transform:scale(0.3) translateY(40px); opacity:0; }
    100%{ transform:scale(1) translateY(0); opacity:1; }
  }
  .p3{ background:linear-gradient(135deg,#1a1008,#0d0804); border-color:#cd7f32; box-shadow:0 0 40px rgba(205,127,50,0.35); }
  .p2{ background:linear-gradient(135deg,#001a24,#000d14); border-color:#0ea5e9; box-shadow:0 0 40px rgba(14,165,233,0.35); }
  .p1{ background:linear-gradient(135deg,#0f2940,#071a2b); border-color:#f5c518; box-shadow:0 0 60px rgba(245,197,24,0.45); }
  .pod-medal{ font-size:72px; display:block; animation:spin 1s ease-out; margin-bottom:8px; }
  @keyframes spin{ 0%{ transform:rotateY(0deg) scale(0.5); } 100%{ transform:rotateY(720deg) scale(1); } }
  .pod-pos{ font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:1.5px; margin-bottom:6px; }
  .p1 .pod-pos{ color:#f5c518; } .p2 .pod-pos{ color:#0ea5e9; } .p3 .pod-pos{ color:#cd7f32; }
  .pod-name{ font-size:30px; font-weight:800; color:#fff; margin-bottom:6px; }
  .pod-pts{ font-size:17px; font-weight:600; }
  .p1 .pod-pts{ color:#f5c518; } .p2 .pod-pts{ color:#0ea5e9; } .p3 .pod-pts{ color:#cd7f32; }

  
   100%{ transform:translateY(-20vh); opacity:0; } }
</style>
</head>
<body>
<div class="wrap">

  <div class="hdr">
    <div class="hdr-top">
      <a href="index.html" class="hdr-btn">&#8592; Predictions</a>
      <div class="hdr-center">
        <div class="hdr-title">&#127942; SHC-1999-n FIFA 2026</div>
        <div class="hdr-result" id="lastResultLine">Loading...</div>
      </div>
      <button class="hdr-btn" onclick="loadLeaderboard()">&#8635; Refresh</button>
    </div>
  </div>

  <div class="tidbits" id="tidbitsBox"></div>

  <div class="lb-wrap">
    <table class="lb-table">
      <thead>
        <tr>
          <th style="width:36px; background:#64748b; color:#fff;">#</th>
          <th class="name" style="background:#64748b; color:#fff;">Name</th>
          <th style="background:#0ea5e9; color:#fff;">Exact</th>
          <th style="background:#f472b6; color:#fff;">Correct</th>
          <th style="background:#22c55e; color:#fff;">Wrong</th>
          <th style="background:#f5c518; color:#1a1200;">Listed</th>
          <th style="background:#64748b; color:#fff;">Points</th>
        </tr>
      </thead>
      <tbody id="lbBody">
        <tr><td colspan="7" class="loading">Loading crew list...</td></tr>
      </tbody>
    </table>
  </div>

  <div class="flip-hint" id="flipHint">↑ swipe up to flip · ↓ swipe down to restore</div>

  <div class="legend">
    <b style="color:#333;">Points:</b> Exact score +5 &middot; Correct result +2 &middot; Wrong -1 &middot; No prediction 0<br>
    <b style="color:#333;">Listed</b> = open predictions on record &middot; &#8593;&#8595; = movement since last refresh
  </div>

  <div class="status" id="status"></div>
</div>

<div class="podium-overlay" id="podiumOverlay">
  <div class="podium-card" id="podiumCard"></div>
</div>



<script>
const ENDPOINT = "https://script.google.com/macros/s/AKfycbxC_Xsx_0ffVWpJRZOLXIS0Kr6H9MST4QMw8wBEuGJSifTebg22Qpl4SDsX4BMexM8/exec";

const FLAGS = {
  "Mexico":"&#127474;&#127485;","South Africa":"&#127487;&#127462;","South Korea":"&#127472;&#127479;","Czechia":"&#127464;&#127487;","Canada":"&#127464;&#127462;",
  "Bosnia & Herzegovina":"&#127463;&#127462;","Bosnia and Herzegovina":"&#127463;&#127462;","USA":"&#127482;&#127480;","United States":"&#127482;&#127480;","Paraguay":"&#127477;&#127486;",
  "Qatar":"&#127478;&#127462;","Switzerland":"&#127464;&#127469;","Brazil":"&#127463;&#127479;","Morocco":"&#127474;&#127462;","Haiti":"&#127469;&#127481;","Scotland":"&#127988;",
  "Australia":"&#127462;&#127482;","Turkey":"&#127481;&#127479;","Turkiye":"&#127481;&#127479;","Germany":"&#127465;&#127466;","Curaçao":"&#127464;&#127484;","Netherlands":"&#127475;&#127473;",
  "Japan":"&#127471;&#127477;","Ivory Coast":"&#127464;&#127470;","Ecuador":"&#127466;&#127464;","Sweden":"&#127480;&#127466;","Tunisia":"&#127481;&#127475;","Spain":"&#127466;&#127480;",
  "Cape Verde":"&#127464;&#127483;","Belgium":"&#127463;&#127466;","Egypt":"&#127466;&#127468;","Saudi Arabia":"&#127480;&#127462;","Uruguay":"&#127482;&#127486;","Iran":"&#127470;&#127479;",
  "New Zealand":"&#127475;&#127487;","France":"&#127467;&#127479;","Senegal":"&#127480;&#127475;","Iraq":"&#127470;&#127478;","Norway":"&#127475;&#127476;","Argentina":"&#127462;&#127479;",
  "Algeria":"&#127465;&#127487;","Austria":"&#127462;&#127481;","Jordan":"&#127471;&#127476;","Portugal":"&#127477;&#127481;","DR Congo":"&#127464;&#127465;","England":"&#127988;",
  "Croatia":"&#127469;&#127479;","Ghana":"&#127468;&#127469;","Panama":"&#127477;&#127462;","Uzbekistan":"&#127482;&#127487;","Colombia":"&#127464;&#127476;"
};
function flagFor(t){ return FLAGS[t]||""; }

const ROW_CLASSES = ["r-blue","r-pink","r-green","r-yellow"];

async function loadLeaderboard(){
  try{
    const res = await fetch(ENDPOINT+"?type=leaderboard");
    const d = await res.json();
    if(d.status==="ok"){ render(d); return; }
  }catch(e){ console.log('fetch failed:',e.message); }
  try{ await jsonpLoad(); }
  catch(e2){
    document.getElementById("lbBody").innerHTML='<tr><td colspan="7" style="padding:20px;text-align:center;color:#ff5e3a;">Could not reach leaderboard. Error: '+e2+'</td></tr>';
    document.getElementById("status").textContent='Error - try refreshing';
  }
}

function jsonpLoad(){
  return new Promise((res,rej)=>{
    const cb="lbCb_"+Date.now(); const s=document.createElement("script"); let ok=false;
    window[cb]=function(d){ ok=true; if(d.status==="ok"){ render(d); res(); } else rej(); delete window[cb]; s.remove(); };
    s.src=ENDPOINT+"?type=leaderboard&callback="+cb;
    s.onerror=()=>{ if(!ok){ delete window[cb]; s.remove(); rej(); } };
    document.body.appendChild(s);
    setTimeout(()=>{ if(!ok){ delete window[cb]; s.remove(); rej(); } },8000);
  });
}

function render(data){
  try{ renderHeader(data.lastResult); }catch(e){}
  try{ renderTidbits(data.tidbits); }catch(e){}
  try{ renderTable(data.leaderboard); }catch(e){ console.error('renderTable error:',e); }
  document.getElementById("status").textContent="Last updated: "+new Date().toLocaleTimeString();
  try{ checkPodiumReveal(data.leaderboard); }catch(e){}
}

function renderHeader(lr){
  const el=document.getElementById("lastResultLine");
  if(!lr){ el.innerHTML='<span style="opacity:0.4;font-size:11px;">No results yet</span>'; return; }
  el.innerHTML=`<span style="font-size:10px;opacity:0.6;text-transform:uppercase;letter-spacing:0.5px;">Updated after ${lr.matchId}</span><br>${flagFor(lr.home)} ${lr.home} ${lr.actualHome} - ${lr.actualAway} ${lr.away} ${flagFor(lr.away)}`;
}

function renderTidbits(t){
  const box=document.getElementById("tidbitsBox");
  if(!t){ box.innerHTML=""; return; }
  const items=[
    {cls:"t-blue",label:"The Oracle Award",name:t.mostlyCorrect?t.mostlyCorrect.name:"—",sub:"I know things"},
    {cls:"t-pink",label:"Incorrect & Incorrupt",name:t.mostlyWrong?t.mostlyWrong.name:"—",sub:"Always wrong, never bent"},
    {cls:"t-green",label:"I'm Ready for 2030",name:t.listedPredictions?t.listedPredictions.name:"—",sub:"Already planning ahead"}
  ];
  box.innerHTML=items.map(i=>`<div class="tidbit ${i.cls}"><div class="tb-label">${i.label}</div><div class="tb-name">${i.name}</div><div class="tb-sub">${i.sub}</div></div>`).join("");
}

function renderTable(rows){
  lbData = rows; // save for flip feature
  let prev={};
  try{ prev=JSON.parse(localStorage.getItem("lbPrevRanks")||"{}"); }catch(e){}
  const cur={};
  let html="";
  rows.forEach((r,i)=>{
    const rank=i+1; cur[r.name]=rank;
    const rc=ROW_CLASSES[(i)%4];
    const medal=rank===1?"&#129351;":rank===2?"&#129352;":rank===3?"&#129353;":rank;
    const ptsClass=r.points<0?" pts-neg":"";
    let mv="";
    if(prev[r.name]!==undefined){
      const d=prev[r.name]-rank;
      mv=d>0?`<span class="move mu">&#8593;${d}</span>`:d<0?`<span class="move md">&#8595;${Math.abs(d)}</span>`:`<span class="move ms">&#8211;</span>`;
    }
    const listed=r.listed!==undefined?r.listed:(r.noPred||0);
    html+=`<tr class="${rc}"><td>${medal}${mv}</td><td class="name">${r.name}</td><td>${r.exact}</td><td>${r.correct}</td><td>${r.wrong}</td><td>${listed}</td><td class="pts${ptsClass}">${r.points}</td></tr>`;
  });
  document.getElementById("lbBody").innerHTML=html;
  try{ localStorage.setItem("lbPrevRanks",JSON.stringify(cur)); }catch(e){}
}

function checkPodiumReveal(rows){
  const top3=rows.slice(0,3).map(r=>r.name).join("|");
  const prev=localStorage.getItem("lbTop3Prev")||"";
  if(!prev||prev===top3){ localStorage.setItem("lbTop3Prev",top3); return; }
  localStorage.setItem("lbTop3Prev",top3);
  setTimeout(()=>startPodium(rows),600);
}

const STEPS=[{pos:3,cls:"p3",label:"&#129353; Second Runner Up"},{pos:2,cls:"p2",label:"&#129352; Runner Up"},{pos:1,cls:"p1",label:"&#129351; Champion"}];

function startPodium(rows){
  let step=0;
  const ov=document.getElementById("podiumOverlay"); const card=document.getElementById("podiumCard");
  ov.classList.add("show"); showStep(step,rows,card);
  const iv=setInterval(()=>{
    step++;
    if(step>=STEPS.length){ clearInterval(iv); setTimeout(()=>ov.classList.remove("show"),2000); return; }
    showStep(step,rows,card);
  },2500);
}

function showStep(step,rows,card){
  const s=STEPS[step]; const r=rows[s.pos-1]; if(!r) return;
  card.className="podium-card "+s.cls;
  card.innerHTML=`<span class="pod-medal">${s.label.split(" ")[0]}</span><div class="pod-pos">${s.label.split(" ").slice(1).join(" ")}</div><div class="pod-name">${r.name}</div><div class="pod-pts">${r.points} pts</div>`;
}


// ---------- SWIPE TO FLIP (row reorder) ----------
// Requires: fast swipe (< 250ms) + large distance (120px+) + starts within table zone
let tsY=0, tsX=0, tsTime=0, isFlipped=false, isAnimating=false;
let lbData = []; // stores current leaderboard data for re-render

document.addEventListener('touchstart', e=>{
  tsY = e.touches[0].clientY;
  tsX = e.touches[0].clientX;
  tsTime = Date.now();
}, {passive:true});

document.addEventListener('touchend', e=>{
  const dy = tsY - e.changedTouches[0].clientY;
  const dx = Math.abs(tsX - e.changedTouches[0].clientX);
  const dt = Date.now() - tsTime;

  // Must be: fast (<250ms), far (>120px), more vertical than horizontal
  if(dt > 250 || Math.abs(dy) < 120 || dx > Math.abs(dy) * 0.5) return;
  if(isAnimating) return;

  // Must start within the lb-wrap zone
  const lbWrap = document.querySelector('.lb-wrap');
  if(!lbWrap) return;
  const rect = lbWrap.getBoundingClientRect();
  if(tsY < rect.top - 40 || tsY > rect.bottom + 40) return;

  if(dy > 0 && !isFlipped){
    flipTable(false);
  } else if(dy < 0 && isFlipped){
    flipTable(true);
  }
}, {passive:true});

function showFlipMessage(msg, emoji, duration, cb){
  const div = document.createElement('div');
  div.className = 'flip-msg';
  div.innerHTML = '<div class="flip-msg-inner"><span class="flip-msg-emoji">'+emoji+'</span><div class="flip-msg-text">'+msg+'</div></div>';
  document.body.appendChild(div);
  setTimeout(()=>{
    div.style.transition = 'opacity 0.4s';
    div.style.opacity = '0';
    setTimeout(()=>{ div.remove(); if(cb) cb(); }, 400);
  }, duration);
}

function scrambleRows(cb){
  const rows = document.querySelectorAll('#lbBody tr');
  rows.forEach((r, i)=>{
    r.classList.remove('scrambling');
    setTimeout(()=>r.classList.add('scrambling'), i * 40);
  });
  setTimeout(cb, rows.length * 40 + 600);
}

function flipTable(restore){
  if(!lbData || lbData.length === 0) return;
  isAnimating = true;

  const msg = restore
    ? "Back to normal.. for now 😌"
    : "Ahh you cannot see where you are..<br>let me help you 👀";
  const emoji = restore ? "🔃" : "🙃";

  showFlipMessage(msg, emoji, 1400, ()=>{
    scrambleRows(()=>{
      const sorted = restore
        ? [...lbData]
        : [...lbData].reverse();
      renderTableRows(sorted, restore ? false : true);
      document.getElementById('flipHint').textContent = restore
        ? '⚡ fast swipe up to flip · fast swipe down to restore'
        : '⚡ fast swipe down to restore';
      isFlipped = !restore;
      isAnimating = false;
    });
  });
}

function renderTableRows(rows, reversed){
  let prev={};
  try{ prev=JSON.parse(localStorage.getItem('lbPrevRanks')||'{}'); }catch(e){}
  let html='';
  rows.forEach((r,i)=>{
    // Display rank = always based on original position in full lbData
    const originalRank = lbData.indexOf(r) + 1;
    const displayRank = reversed ? (lbData.length - originalRank + 1) : originalRank;
    const rc=['r-blue','r-pink','r-green','r-yellow'][(originalRank-1)%4];
    const medal=originalRank===1?'&#129351;':originalRank===2?'&#129352;':originalRank===3?'&#129353;':originalRank;
    const ptsClass=r.points<0?' pts-neg':'';;
    let mv='';
    if(prev[r.name]!==undefined){
      const d=prev[r.name]-originalRank;
      mv=d>0?'<span class="move mu">&#8593;'+d+'</span>':d<0?'<span class="move md">&#8595;'+Math.abs(d)+'</span>':'<span class="move ms">&#8211;</span>';
    }
    const listed=r.listed!==undefined?r.listed:(r.noPred||0);
    html+='<tr class="'+rc+'"><td>'+medal+mv+'</td><td class="name">'+r.name+'</td><td>'+r.exact+'</td><td>'+r.correct+'</td><td>'+r.wrong+'</td><td>'+listed+'</td><td class="pts'+ptsClass+'">'+r.points+'</td></tr>';
  });
  document.getElementById('lbBody').innerHTML=html;
}

loadLeaderboard();

</script>
</body>
</html>
