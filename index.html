<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SHC-1999-n Fifa 2026</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚽</text></svg>">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%230b1220'/><text x='50' y='65' font-size='60' text-anchor='middle'>⚽</text></svg>">
<style>
  :root{
    --bg:#071a2b; --card:#0f2940; --card2:#163a57; --line:#2d5577;
    --text:#f2f7fb; --muted:#a9c4dc; --accent:#00d97e; --accent2:#ff5e3a; --green:#3ddc97;
    --red:#ff6b6b; --blue:#4dabf7;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color: transparent;}
  body{
    margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg); color:var(--text); padding-bottom:40px;
  }
  .wrap{max-width:480px; margin:0 auto; padding:12px;}
  header{
    display:flex; align-items:center; justify-content:space-between;
    padding:10px 4px; position:sticky; top:0; background:var(--bg); z-index:10;
  }
  h1{font-size:18px; margin:0; font-weight:700;}
  .subtitle{font-size:12px; color:var(--muted); margin-top:2px;}
  .nav{
    display:flex; align-items:center; justify-content:space-between;
    margin:8px 0 14px; gap:8px;
  }
  .nav button{
    background:var(--accent); color:var(--bg); border:none;
    border-radius:12px; padding:12px 18px; font-size:20px; font-weight:800; min-width:50px;
    box-shadow:0 2px 6px rgba(0,217,126,0.35);
  }
  .nav button:disabled{opacity:0.25; box-shadow:none;}
  .nav .label{font-size:15px; font-weight:700; color:var(--text); text-align:center; flex:1; letter-spacing:0.3px;}
  .matchday{
    background:var(--card); border:1px solid var(--line); border-radius:14px;
    margin-bottom:12px; overflow:hidden;
  }
  .md-head{
    padding:10px 14px; font-weight:700; font-size:14px;
    background:var(--card2); display:flex; justify-content:space-between; align-items:center;
  }
  .md-head .badge{
    font-size:11px; font-weight:600; color:var(--bg); background:var(--accent);
    padding:2px 8px; border-radius:8px;
  }
  .match{
    padding:12px 14px; border-top:1px solid var(--line);
    border:2px solid transparent;
    transition:border-left-color 0.3s;
  }
  .match.needs-attention{
    border:2px solid transparent;
    border-radius:10px;
    animation:attention-pulse 2s ease-in-out infinite;
    margin:4px 0;
  }
  @keyframes attention-pulse{
    0%,100%{ border-color:rgba(245,197,24,0.15); box-shadow:0 0 0 0 rgba(245,197,24,0); }
    50%{ border-color:rgba(245,197,24,0.9); box-shadow:0 0 8px 2px rgba(245,197,24,0.2); }
  }
  .match-row{
    display:flex; justify-content:space-between; align-items:center; cursor:pointer;
  }
  .teams{font-size:16.5px; font-weight:700;}
  .meta{font-size:12.5px; color:var(--muted); margin-top:3px; font-weight:500;}
  .status{
    font-size:11.5px; font-weight:800; padding:4px 9px; border-radius:8px; white-space:nowrap; margin-left:8px;
  }
  .status.open{background:rgba(61,220,151,0.15); color:var(--green);}
  .status.locked{background:rgba(255,107,107,0.15); color:var(--red);}
  .status.exact{background:rgba(255,209,102,0.2); color:#ffd166; font-weight:800;}
  .status.correct{background:rgba(77,171,247,0.15); color:var(--blue); font-weight:800;}
  .status.wrong{background:rgba(255,107,107,0.15); color:var(--red);}
  .detail{display:none; margin-top:10px;}
  .detail.show{display:block;}
  .info-box{
    background:var(--bg); border:1px solid var(--line); border-radius:10px;
    padding:10px; margin-bottom:10px; font-size:12.5px; color:var(--muted); line-height:1.5;
  }
  .info-box b{color:var(--text);}
  .pred-row{display:flex; align-items:center; gap:10px; justify-content:center; margin:10px 0;}
  .pred-row input{
    width:54px; height:48px; text-align:center; font-size:20px; font-weight:700;
    background:var(--bg); color:var(--text); border:2px solid var(--line); border-radius:10px;
    transition:border-color 0.2s;
  }
  .pred-row input.filled{ border-color:var(--accent); }
  .pred-row input:disabled{opacity:0.6;}
  .vs{font-size:13px; color:var(--muted);}
  .pred-team{font-size:12px; text-align:center; color:var(--muted); width:54px;}
  .actions{display:flex; gap:8px; margin-top:8px;}
  .actions button{
    flex:1; padding:10px; border-radius:10px; border:1px solid var(--line);
    background:var(--card2); color:var(--text); font-size:13px; font-weight:600;
  }
  .actions button.primary{background:var(--accent); color:var(--bg); border:none;}
  .actions button:disabled{opacity:0.4;}
  .saved-note{font-size:11px; color:var(--green); margin-top:6px; min-height:14px;}
  .actual-result{
    font-size:12px; color:var(--accent); font-weight:700; text-align:center;
    margin-top:8px; padding:6px 10px; background:var(--card2); border-radius:8px;
  }
  .topbar-actions{display:flex; gap:8px;}
  .topbar-actions button{
    background:var(--card2); border:1px solid var(--line); color:var(--text);
    border-radius:10px; padding:8px 10px; font-size:12px;
  }
  .name-bar{
    display:flex; gap:8px; align-items:center; margin-bottom:10px; font-size:12px; color:var(--muted);
  }
  .name-bar input{
    flex:1; background:var(--card2); border:1px solid var(--line); color:var(--text);
    border-radius:8px; padding:8px 10px; font-size:13px;
  }
  .export-box{
    background:var(--card); border:1px solid var(--line); border-radius:12px;
    padding:14px; margin-top:14px;
  }
  .export-header{
    background:var(--accent); color:var(--bg); font-weight:700; font-size:15px;
    text-align:center; padding:12px; border-radius:10px; cursor:pointer;
    transition:background 0.15s, transform 0.05s;
  }
  .export-header:active{ background:#00b56a; transform:scale(0.99); }
  .export-header.shake{ animation: shake 0.4s; background:var(--accent2); color:#fff; }
  @keyframes shake{
    0%,100%{transform:translateX(0);}
    20%{transform:translateX(-6px);}
    40%{transform:translateX(6px);}
    60%{transform:translateX(-4px);}
    80%{transform:translateX(4px);}
  }
  .name-bar input.missing{ border-color:var(--accent2); box-shadow:0 0 0 2px rgba(255,94,58,0.35); }
  .export-box textarea{
    width:100%; min-height:140px; background:var(--bg); color:var(--text);
    border:1px solid var(--line); border-radius:10px; padding:10px; font-size:12.5px;
    font-family:ui-monospace, Menlo, monospace; line-height:1.5;
  }
  .export-box .actions{margin-top:8px;}
  .toast{
    position:fixed; bottom:16px; left:50%; transform:translateX(-50%);
    background:var(--card2); border:1px solid var(--line); color:var(--text);
    padding:8px 16px; border-radius:20px; font-size:12px; opacity:0; transition:opacity 0.3s;
    pointer-events:none; z-index:50;
  }
  .toast.show{opacity:1;}
  .countdown{
    font-weight:800; animation: fifa-blink 3s ease-in-out infinite, fifa-color 8s linear infinite;
  }
  @keyframes fifa-blink{
    0%, 100%{ opacity:1; }
    50%{ opacity:0.3; }
  }
  @keyframes fifa-color{
    0%{ color:#00d97e; }
    33%{ color:#4dabf7; }
    66%{ color:#ff5e3a; }
    100%{ color:#00d97e; }
  }
  .lb-toggle{
    width:100%; margin:0 0 14px; background:var(--card2); color:var(--text);
    border:1px solid var(--line); border-radius:12px; padding:12px; font-size:14px; font-weight:700;
  }
  .action-row{
    display:flex; gap:6px; margin:0 0 14px;
  }
  .action-btn{
    flex:1; background:var(--card2); color:var(--text); border:1px solid var(--line);
    border-radius:12px; padding:8px 4px; font-size:11px; font-weight:700;
    text-align:center; display:flex; align-items:center; justify-content:center;
    white-space:normal; line-height:1.25; min-height:40px;
  }
  .action-btn:active{ background:var(--line); }

  /* ---------- Action animations overlay ---------- */
  .anim-overlay{
    position:fixed; inset:0; z-index:200; display:none;
    align-items:center; justify-content:center; pointer-events:none;
    background:rgba(5,15,29,0.35);
  }
  .anim-overlay.show{ display:flex; }
  .anim-dice{
    font-size:64px; animation: dice-roll 0.7s ease-in-out;
  }
  @keyframes dice-roll{
    0%{ transform:rotate(0deg) scale(0.5); opacity:0; }
    30%{ transform:rotate(180deg) scale(1.2); opacity:1; }
    60%{ transform:rotate(380deg) scale(1); }
    100%{ transform:rotate(720deg) scale(0.8); opacity:0; }
  }
  .anim-thread{
    width:80%; height:4px; background:var(--accent); border-radius:2px;
    transform-origin:left center; animation: thread-pull 0.7s ease-in-out;
    box-shadow:0 0 12px var(--accent);
  }
  @keyframes thread-pull{
    0%{ transform:scaleX(0); opacity:0; }
    50%{ transform:scaleX(1); opacity:1; }
    100%{ transform:scaleX(1) translateX(20%); opacity:0; }
  }
  .anim-trophy{
    font-size:64px; animation: trophy-spin 0.7s ease-in-out;
  }
  @keyframes trophy-spin{
    0%{ transform:rotateY(0deg) scale(0.6); opacity:0; }
    40%{ transform:rotateY(360deg) scale(1.2); opacity:1; }
    100%{ transform:rotateY(720deg) scale(0.8); opacity:0; }
  }
  /* ---------- Custom Score Keypad ---------- */
  .score-btn{
    width:54px; height:48px; text-align:center; font-size:20px; font-weight:700;
    background:var(--bg); color:var(--text); border:2px solid var(--line); border-radius:10px;
    cursor:pointer; transition:border-color 0.2s;
    display:flex; align-items:center; justify-content:center;
  }
  .score-btn.filled{ border-color:var(--accent); color:var(--accent); }
  .score-btn.disabled{ opacity:0.4; cursor:default; }
  .keypad-overlay{
    position:fixed; inset:0; z-index:400; display:none;
    align-items:flex-end; justify-content:center;
    background:rgba(5,15,29,0.6);
  }
  .keypad-overlay.show{ display:flex; }
  .keypad-box{
    background:var(--card); border-radius:20px 20px 0 0; padding:16px 16px 32px;
    width:100%; max-width:480px;
    animation:keypad-up 0.25s ease-out;
  }
  @keyframes keypad-up{
    0%{ transform:translateY(100%); }
    100%{ transform:translateY(0); }
  }
  .keypad-title{
    font-size:13px; color:var(--muted); text-align:center; margin-bottom:12px; font-weight:600;
  }
  .keypad-grid{
    display:grid; grid-template-columns:repeat(6,1fr); gap:8px; margin-bottom:10px;
  }
  .keypad-key{
    height:52px; border-radius:12px; background:var(--card2); color:var(--text);
    font-size:22px; font-weight:800; border:none; cursor:pointer;
    transition:background 0.1s, transform 0.1s;
  }
  .keypad-key:active{ background:var(--accent); color:var(--bg); transform:scale(0.94); }
  .keypad-key.selected{ background:var(--accent); color:var(--bg); }
  .keypad-higher{
    width:100%; height:48px; border-radius:12px; background:var(--card2);
    color:var(--muted); font-size:14px; font-weight:700; border:1px dashed var(--line);
    cursor:pointer; margin-bottom:8px;
  }
  .keypad-cancel{
    width:100%; height:44px; border-radius:12px; background:transparent;
    color:var(--accent2); font-size:14px; font-weight:700; border:none; cursor:pointer;
  }
  .really-overlay{
    position:fixed; inset:0; z-index:500; display:none;
    align-items:center; justify-content:center;
    background:rgba(5,15,29,0.75);
  }
  .really-overlay.show{ display:flex; }
  .really-box{
    background:var(--card); border-radius:16px; padding:24px 20px;
    max-width:300px; width:90%; text-align:center;
    animation:welcome-pop 0.3s cubic-bezier(0.34,1.56,0.64,1);
    border:1px solid var(--line);
  }
  .really-emoji{ font-size:48px; margin-bottom:8px; }
  .really-title{ font-size:18px; font-weight:900; color:var(--text); margin-bottom:6px; }
  .really-sub{ font-size:13px; color:var(--muted); margin-bottom:16px; }
  .really-input{
    width:80px; height:52px; text-align:center; font-size:24px; font-weight:800;
    background:var(--bg); color:var(--text); border:2px solid var(--accent);
    border-radius:10px; margin-bottom:14px;
  }
  .really-row{ display:flex; gap:8px; }
  .really-confirm{ flex:1; height:44px; border-radius:10px; background:var(--accent);
    color:var(--bg); border:none; font-size:14px; font-weight:800; cursor:pointer; }
  .really-cancel{ flex:1; height:44px; border-radius:10px; background:var(--card2);
    color:var(--muted); border:none; font-size:14px; font-weight:700; cursor:pointer; }
  /* ---------- Verification popup ---------- */
  .verify-overlay{
    position:fixed; inset:0; z-index:350; display:none;
    align-items:center; justify-content:center; padding:20px;
    background:rgba(5,15,29,0.6);
  }
  .verify-overlay.show{ display:flex; }
  .verify-box{
    background:var(--card); border-radius:16px; padding:20px;
    max-width:380px; width:100%; max-height:80vh; overflow-y:auto;
    box-shadow:0 8px 30px rgba(0,0,0,0.4); border:1px solid var(--line);
    animation:welcome-pop 0.3s cubic-bezier(0.34,1.56,0.64,1);
  }
  .verify-title{ font-size:16px; font-weight:800; color:var(--accent); text-align:center; margin-bottom:4px; }
  .verify-sub{ font-size:11.5px; color:var(--muted); text-align:center; margin-bottom:12px; }
  .verify-list{ font-size:12.5px; color:var(--text); line-height:2; }
  .verify-row{ border-bottom:1px solid var(--line); padding:3px 0; display:flex; justify-content:space-between; align-items:center; }
  .verify-row:last-child{ border-bottom:none; }
  .verify-ok{ color:var(--accent); font-weight:700; }
  .verify-miss{ color:var(--accent2); font-weight:700; }
  .verify-close{ width:100%; margin-top:14px; background:var(--accent); color:var(--bg);
    border:none; border-radius:10px; padding:11px; font-size:14px; font-weight:700; cursor:pointer; }
  /* ---------- History panel ---------- */
  .history-panel{
    background:var(--card); border-radius:14px; padding:12px 14px;
    margin-top:8px; font-size:12.5px; color:var(--text); line-height:1.8;
    border:1px solid var(--line);
  }
  .history-md{ font-size:11px; font-weight:800; color:var(--muted); text-transform:uppercase;
    letter-spacing:0.5px; margin:8px 0 4px; }
  .history-row{ display:flex; justify-content:space-between; padding:2px 0;
    border-bottom:1px solid rgba(255,255,255,0.04); }
  .history-row:last-child{ border-bottom:none; }
  .h-match{ color:var(--muted); font-size:12px; }
  .h-pred{ font-weight:700; }
  .h-exact{ color:#ffd166; }
  .h-correct{ color:var(--blue); }
  .h-wrong{ color:var(--red); }
  .h-open{ color:var(--accent); }
  .h-none{ color:var(--muted); font-style:italic; }
  /* ---------- DICE POPUP ---------- */
  .dice-overlay{
    position:fixed; inset:0; z-index:450; display:none;
    align-items:center; justify-content:center;
    background:rgba(5,15,29,0.75);
  }
  .dice-overlay.show{ display:flex; }
  .dice-box{
    background:var(--card); border-radius:20px; padding:28px 24px;
    max-width:300px; width:88%; text-align:center;
    border:1px solid var(--line);
    animation:dice-pop 0.35s cubic-bezier(0.34,1.56,0.64,1);
    box-shadow:0 8px 30px rgba(0,0,0,0.4);
  }
  @keyframes dice-pop{
    0%{ transform:scale(0.4) rotate(-15deg); opacity:0; }
    100%{ transform:scale(1) rotate(0deg); opacity:1; }
  }
  .dice-emoji{
    font-size:64px; display:block; margin-bottom:10px;
    animation:dice-spin 0.6s ease-in-out infinite alternate;
  }
  @keyframes dice-spin{
    0%{ transform:rotate(-20deg) scale(0.9); }
    100%{ transform:rotate(20deg) scale(1.1); }
  }
  .dice-title{ font-size:18px; font-weight:900; color:var(--text); margin-bottom:6px; }
  .dice-sub{ font-size:12px; color:var(--muted); margin-bottom:18px; line-height:1.5; }
  .dice-btns{ display:flex; gap:10px; }
  .dice-yes{
    flex:1; padding:12px; background:var(--accent); color:var(--bg);
    border:none; border-radius:12px; font-size:14px; font-weight:800; cursor:pointer;
  }
  .dice-no{
    flex:1; padding:12px; background:var(--card2); color:var(--muted);
    border:1px solid var(--line); border-radius:12px; font-size:14px; font-weight:700; cursor:pointer;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <h1>SHC-1999-n Fifa 2026</h1>
      <div class="subtitle" style="font-style:italic;">Trust in God and do the right</div>
      <div class="subtitle" id="clock"></div>
    </div>
    <div class="topbar-actions">
      <button onclick="goToday()">Today</button>
    </div>
  </header>

  <div class="name-bar">
    <span>Your name</span>
    <input type="text" id="userName" placeholder="e.g. Raj" oninput="saveName()">
  </div>

  <div class="nav">
    <button id="prevBtn" onclick="changeWindow(-1)">&#8592;</button>
    <div class="label" id="windowLabel"></div>
    <button id="nextBtn" onclick="changeWindow(1)">&#8594;</button>
  </div>

  <div class="action-row">
    <button class="action-btn" onclick="playAnimThen('thread', loadMyHistory)">My வரலாறு</button>
    <button class="action-btn" onclick="playAnimThen('thread', loadMyPicks)">🔄 All Predictions</button>
    <button class="action-btn" onclick="playAnimThen('trophy', goToLeaderboard)">🏆 Leaderboard</button>
  </div>
  <div id="myPicksBox" style="margin-top:8px;"></div>

  <div class="anim-overlay" id="animOverlay"></div>
  <div class="verify-overlay" id="verifyOverlay">
    <div class="verify-box" id="verifyBox"></div>
  </div>

  <div class="dice-overlay" id="diceOverlay">
    <div class="dice-box">
      <span class="dice-emoji">🎲</span>
      <div class="dice-title">Roll the dice?</div>
      <div class="dice-sub">Fill in random predictions for all open matches in this window.</div>
      <div class="dice-btns">
        <button class="dice-no" onclick="closeDicePopup()">Nah</button>
        <button class="dice-yes" onclick="confirmDiceRoll()">Roll it! 🎲</button>
      </div>
    </div>
  </div>
  <div class="keypad-overlay" id="keypadOverlay" onclick="closeKeypad()">
    <div class="keypad-box" onclick="event.stopPropagation()">
      <div class="keypad-title" id="keypadTitle">Score</div>
      <div class="keypad-grid" id="keypadGrid">
        <button class="keypad-key" data-val="0" onclick="keypadSelect(0)">0</button>
        <button class="keypad-key" data-val="1" onclick="keypadSelect(1)">1</button>
        <button class="keypad-key" data-val="2" onclick="keypadSelect(2)">2</button>
        <button class="keypad-key" data-val="3" onclick="keypadSelect(3)">3</button>
        <button class="keypad-key" data-val="4" onclick="keypadSelect(4)">4</button>
        <button class="keypad-key" data-val="5" onclick="keypadSelect(5)">5</button>
      </div>
      <button class="keypad-higher" onclick="openReally()">6+ &nbsp;🤨</button>
      <button class="keypad-cancel" onclick="closeKeypad()">Cancel</button>
    </div>
  </div>

  <div class="really-overlay" id="reallyOverlay">
    <div class="really-box">
      <div class="really-emoji">🤨</div>
      <div class="really-title">Really?</div>
      <div class="really-sub">A score that high? Bold. Enter it if you dare.</div>
      <input class="really-input" id="reallyInput" type="number" inputmode="numeric"
        min="6" max="20" placeholder="?" onkeydown="if(event.key==='Enter')confirmReally()">
      <div class="really-row">
        <button class="really-cancel" onclick="closeReally()">Maybe not</button>
        <button class="really-confirm" onclick="confirmReally()">I'm sure 🔥</button>
      </div>
    </div>
  </div>

  <div id="matchdays"></div>

  <div class="export-box">
    <div class="export-header" onclick="confirmExport()">Confirm</div>
    <div style="font-size:12px; color:var(--muted); margin-top:8px;">
      Pressing composes your predictions and copies it to be pasted.
    </div>
    <textarea id="exportText" readonly placeholder="Tap above to compose and copy your message..." style="margin-top:10px;"></textarea>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ---------- DATA ----------
// Source schedule times are labeled as listed (CEST, UTC+2). matchDateTime() converts to true UTC.
// Actual results, fetched from the shared sheet on page load.
// Keyed by numeric match id: {9: {home: 4, away: 0}, ...}
let actualResults = {};
let serverPredictions = {}; // what's actually confirmed in the sheet {matchId: {home, away}}

// Compares a prediction to the actual result and returns a short verdict label
function scoreVerdict(pred, actual){
  if(pred.home === actual.home && pred.away === actual.away) return "Exact - bullseye";
  const predOutcome = pred.home > pred.away ? 'H' : (pred.home < pred.away ? 'A' : 'D');
  const actualOutcome = actual.home > actual.away ? 'H' : (actual.home < actual.away ? 'A' : 'D');
  if(predOutcome === actualOutcome) return "Correct result";
  return "Off course";
}

// ---------- STATE ----------
let predictions = {}; // {matchId: {home, away, submitted, submittedAt}}
let openDetails = new Set();
let userName = "";
let windowStart = 1; // matchday index that starts the visible 2-day window
const TOTAL_MD = 17;

// ---------- STORAGE ----------
// Hosted version: use localStorage so predictions persist on each user's device/browser.
const storage = {
  async get(key){
    const v = localStorage.getItem(key);
    return v===null ? null : {key, value: v};
  },
  async set(key, value){
    localStorage.setItem(key, value);
    return {key, value};
  }
};
async function loadState(){
  try{
    const r = await storage.get('predictions', false);
    predictions = r ? JSON.parse(r.value) : {};
  }catch(e){ predictions = {}; }
  try{
    const r2 = await storage.get('userName', false);
    userName = r2 ? JSON.parse(r2.value) : "";
  }catch(e){ userName = ""; }
  document.getElementById('userName').value = userName;
}
async function savePredictions(){
  try{ await storage.set('predictions', JSON.stringify(predictions), false); }catch(e){}
}
async function saveName(){
  userName = document.getElementById('userName').value;
  document.getElementById('userName').classList.remove('missing');
  try{ await storage.set('userName', JSON.stringify(userName), false); }catch(e){}
  // Restore all predictions from server whenever name is set/changed
  if(userName && userName.trim()) restoreFromServer(userName.trim());
}

// ---------- RESTORE PREDICTIONS FROM SERVER ----------
// Fetches all on-record predictions for this user and restores them locally.
// Covers both locked and open matches — critical after cache clear.
async function restoreFromServer(name){
  let picks = null;
  try{
    const res = await fetch(SHEET_ENDPOINT + '?type=mypicks&name=' + encodeURIComponent(name));
    const data = await res.json();
    if(data.status === 'ok') picks = data.picks;
  }catch(e){
    try{ picks = await fetchMyPicksRaw(name); }catch(e2){ return; }
  }
  if(!picks || picks.length === 0) return;

  // Store server predictions for mismatch detection
  serverPredictions = {};
  picks.forEach(p=>{
    const num = parseInt((p.matchId||'').replace(/\D/g,''), 10);
    if(!isNaN(num)) serverPredictions[num] = {home: p.predHome, away: p.predAway};
  });

  let changed = false;
  picks.forEach(p=>{
    const num = parseInt((p.matchId||'').replace(/\D/g,''), 10);
    if(isNaN(num)) return;
    const existing = predictions[num];
    const m = matches.find(mm=>mm.id===num);
    const locked = m ? isLocked(m) : false;
    if(!existing || existing.home===undefined || locked){
      predictions[num] = {home: p.predHome, away: p.predAway};
      changed = true;
    }
  });
  if(changed){
    await savePredictions();
  }
  render(); // always re-render so attention blinking updates
}

function fetchMyPicksRaw(name){
  return new Promise((resolve, reject)=>{
    const cb = 'mpRaw_' + Date.now();
    const script = document.createElement('script');
    let settled = false;
    window[cb] = function(data){
      settled = true;
      if(data.status === 'ok') resolve(data.picks);
      else reject();
      delete window[cb]; script.remove();
    };
    script.src = SHEET_ENDPOINT + '?type=mypicks&name=' + encodeURIComponent(name) + '&callback=' + cb;
    script.onerror = ()=>{ if(!settled){ delete window[cb]; script.remove(); reject(); } };
    document.body.appendChild(script);
    setTimeout(()=>{ if(!settled){ delete window[cb]; script.remove(); reject(); } }, 8000);
  });
}

// ---------- TIME HELPERS ----------
// Source schedule times are in CEST (UTC+2). Convert to true UTC instants by subtracting 2 hours.
function nowUTC(){ return new Date(); }
function matchDateTime(m){
  const utcMs = Date.parse(m.date + "T" + m.time + ":00Z") - (2 * 60 * 60 * 1000);
  return new Date(utcMs);
}
function isLocked(m){
  return nowUTC() >= matchDateTime(m);
}
function fmtTime(m){
  const d = matchDateTime(m);
  // Display in the viewer's local timezone
  const hh = String(d.getHours()).padStart(2,'0');
  const mm = String(d.getMinutes()).padStart(2,'0');
  const day = d.toLocaleDateString('en-GB', {weekday:'short', day:'2-digit', month:'short'});
  const tzName = Intl.DateTimeFormat(undefined, {timeZoneName:'short'}).formatToParts(d).find(p=>p.type==='timeZoneName').value;
  return `${day}, ${hh}:${mm} ${tzName}`;
}

// ---------- MATCHDAY DETECTION ----------
function getTodayMatchday(){
  const today = new Date();
  const todayStr = today.getUTCFullYear()+"-"+String(today.getUTCMonth()+1).padStart(2,'0')+"-"+String(today.getUTCDate()).padStart(2,'0');
  let md = matches.find(m=>m.date===todayStr);
  if(md) return md.md;
  // find closest upcoming
  let upcoming = matches.filter(m=>m.date>=todayStr);
  if(upcoming.length) return upcoming[0].md;
  return TOTAL_MD;
}

// ---------- RENDER ----------
function getMatchesForMD(md){ return matches.filter(m=>m.md===md); }
function mdLabel(md){
  const ms = getMatchesForMD(md);
  if(!ms.length) return `Match Day ${md}`;
  const d = new Date(ms[0].date + "T00:00:00Z");
  const dateStr = d.toLocaleDateString('en-GB', {weekday:'long', day:'2-digit', month:'short', timeZone:'UTC'});
  return `Match Day ${md} — ${dateStr}`;
}

function render(){
  // clamp window
  if(windowStart < 1) windowStart = 1;
  if(windowStart > TOTAL_MD - 1) windowStart = TOTAL_MD - 1;
  document.getElementById('prevBtn').disabled = windowStart <= 1;
  document.getElementById('nextBtn').disabled = windowStart >= TOTAL_MD - 1;

  const mds = [windowStart, windowStart+1].filter(md=>md<=TOTAL_MD);
  document.getElementById('windowLabel').textContent = mds.map(md=>`Match Day ${md}`).join("   /   ");

  const container = document.getElementById('matchdays');
  container.innerHTML = "";

  mds.forEach(md=>{
    const block = document.createElement('div');
    block.className = 'matchday';
    const todayMd = getTodayMatchday();
    block.innerHTML = `<div class="md-head"><span>${mdLabel(md)}</span>${md===todayMd ? '<span class="badge">TODAY</span>' : ''}</div>`;

    getMatchesForMD(md).forEach(m=>{
      const locked = isLocked(m);
      const p = predictions[m.id] || {};
      let statusClass = locked ? 'locked' : 'open';
      let statusText = locked ? 'Locked' : 'Open';
      if(locked){
        const result = actualResults[m.id];
        const hasPrediction = p.home!==undefined && p.away!==undefined;
        if(result && hasPrediction){
          const verdict = scoreVerdict(p, result);
          if(verdict === "Exact - bullseye"){ statusClass = 'exact'; statusText = 'Exact'; }
          else if(verdict === "Correct result"){ statusClass = 'correct'; statusText = 'Correct'; }
          else { statusClass = 'wrong'; statusText = 'Wrong'; }
        }
      }

      const stats = getStats(m);

      const matchDiv = document.createElement('div');

      // Check if this today's match needs attention (slow amber blink)
      const todayStr = new Date().toISOString().slice(0,10);
      const isToday = m.date === todayStr;
      const p_local = predictions[m.id] || {};
      const p_server = serverPredictions[m.id];
      const hasLocalPred = p_local.home !== undefined && p_local.away !== undefined;
      const hasMismatch = hasLocalPred && p_server &&
        (p_local.home !== p_server.home || p_local.away !== p_server.away);
      const needsAttention = isToday && !locked && (
        !hasLocalPred ||           // no prediction entered
        hasMismatch                 // local differs from sheet
      );

      matchDiv.className = 'match' + (needsAttention ? ' needs-attention' : '');
      matchDiv.innerHTML = `
        <div class="match-row" onclick="toggleDetail(${m.id})">
          <div>
            <div class="teams">M${m.id}: ${m.home} vs ${m.away}</div>
            <div class="meta">Group ${m.group} &middot; ${fmtTime(m)}${p.home!==undefined && p.away!==undefined ? ` &middot; Prediction: ${p.home}-${p.away}` : ''}</div>
          </div>
          <div class="status ${statusClass}">${statusText}</div>
        </div>
        <div class="detail${openDetails.has(m.id) ? ' show' : ''}" id="detail-${m.id}" onclick="event.stopPropagation()">
          <div class="info-box">
            <div><b>Venue:</b> ${stats.venue}</div>
            <div style="margin-top:4px;"><b>Head-to-head:</b> ${stats.h2h}</div>
            <div style="margin-top:4px;"><b>Talking point:</b> ${stats.fact}${m.note ? ' ('+m.note+')' : ''}</div>
            ${openFactCache[m.id] ? `<div style="margin-top:4px;">${openFactCache[m.id]}</div>` : ''}
          </div>
          <div class="pred-row" onclick="event.stopPropagation()">
            <div class="pred-team">${m.home}</div>
            <div class="score-btn ${p.home!==undefined?'filled':''} ${locked?'disabled':''}"
              id="home-${m.id}" onclick="${locked?'':'openKeypad('+m.id+',\'home\')'}">
              ${p.home!==undefined?p.home:'—'}</div>
            <div class="vs">:</div>

              id="away-${m.id}" onclick="${locked?'':'openKeypad('+m.id+',\'away\')'}">
              ${p.away!==undefined?p.away:'—'}</div>

// ---------- BATCH SHEET SUBMISSION ----------
// Sends all predictions in a single POST request, eliminating concurrency issues.
async function submitBatchToSheet(payloads, maxRetries){
  for(let attempt=0; attempt<=maxRetries; attempt++){
    try{
      const res = await fetch(SHEET_ENDPOINT, {
        method: 'POST',
        headers: {'Content-Type': 'text/plain;charset=utf-8'},
        body: JSON.stringify(payloads)
      });
      const data = await res.json();
      if(data && data.status === 'ok') return data;
      if(data && data.status === 'error') return null; // server-side error, no point retrying
    }catch(e){
      if(attempt < maxRetries){
        await new Promise(r=>setTimeout(r, 800));
        continue;
      }
    }
  }
  return null;
}

// ---------- MY SUBMITTED PICKS ----------
// ---------- RECONCILE LOCKED PREDICTIONS WITH SERVER RECORD ----------
// For any match that is now locked, overwrite the locally-stored prediction
// with whatever was actually recorded on the server (or clear it if nothing
// was ever submitted), so "Final: X-Y / Your call: A-B" always reflects the
// truth used for scoring rather than a stale local edit.
async function reconcileLockedPredictions(){
  if(!userName || !userName.trim()) return;
  let data = null;
  try{
    const res = await fetch(SHEET_ENDPOINT + '?type=mypicks&name=' + encodeURIComponent(userName.trim()));
    const d = await res.json();
    if(d.status === 'ok') data = d;
  }catch(e){ /* try JSONP below */ }

  if(!data){
    try{ data = await fetchMyPicksJsonpData(); }catch(e2){ return; }
  }
  if(!data || !data.picks) return;

  const onRecord = {};
  data.picks.forEach(p=>{
    const num = parseInt((p.matchId||'').replace(/\D/g,''), 10);
    if(!isNaN(num)) onRecord[num] = {home: p.predHome, away: p.predAway};
  });

  let changed = false;
  matches.forEach(m=>{
    if(!isLocked(m)) return;
    const record = onRecord[m.id];
    if(record){
      if(!predictions[m.id] || predictions[m.id].home !== record.home || predictions[m.id].away !== record.away){
        predictions[m.id] = {home: record.home, away: record.away};
        changed = true;
      }
    } else if(predictions[m.id]){
      delete predictions[m.id];
      changed = true;
    }
  });

  if(changed){
    await savePredictions();
    render();
  }
}

// Returns a "X vs Y kicks off in Hh Mm" style string for the next upcoming
// match, or null if there's no upcoming match.
function nextKickoffMessage(){
  const now = new Date();
  const next = matches.find(m=>matchDateTime(m) > now);
  if(!next) return null;
  const diff = matchDateTime(next) - now;
  const totalMin = Math.floor(diff/60000);
  const dH = Math.floor(totalMin/60);
  const dM = totalMin % 60;
  const dSec = Math.floor((diff%60000)/1000);
  let countdown;
  if(dH > 0) countdown = `${dH}h ${dM}m`;
  else if(dM > 0) countdown = `${dM}m ${dSec}s`;
  else countdown = `${dSec}s`;
  return `${next.home} vs ${next.away} kicks off in ${countdown}`;
}

// Renders everyone's latest predictions for matches that have kicked off
// but don't have a result yet. If nothing qualifies, shows a fallback
// "next kickoff" message instead.
function renderMyPicks(data){
  const box = document.getElementById('myPicksBox');
  const picks = data.picks || {};

  // Find the highest-numbered match that has an actual result.
  const resolved = matches
    .filter(m=>actualResults[m.id])
    .sort((a,b)=>b.id-a.id);

  if(resolved.length === 0){
    const next = nextKickoffMessage();
    box.innerHTML = next
      ? `<div style="font-size:12px; color:var(--muted); text-align:center;">Nothing to show yet &middot; ${next}</div>`
      : `<div style="font-size:12px; color:var(--muted); text-align:center;">Nothing to show yet.</div>`;
    return;
  }

  const m = resolved[0];
  const actual = actualResults[m.id];
  const entries = (picks["M"+m.id] || []).slice().sort((a,b)=>a.name.localeCompare(b.name));

  let html = `<div style="font-size:12px; color:var(--accent); text-align:center; margin-bottom:6px; font-weight:700;">M${m.id}: ${m.home} vs ${m.away} &middot; Final: ${actual.home}-${actual.away}</div>`;
  html += '<div style="font-size:12.5px; color:var(--text); line-height:1.8;">';
  if(entries.length === 0){
    html += '<div style="color:var(--muted); text-align:center;">No predictions recorded for this match.</div>';
  } else {
    entries.forEach(e=>{
      const verdict = scoreVerdict({home:e.predHome, away:e.predAway}, actual);
      html += `${e.name}: ${e.predHome}-${e.predAway} (${verdict})<br>`;
    });
  }
  html += '</div>';
  box.innerHTML = html;
}

  showToast(copied ? "Copied to clipboard!" : "Tap and hold the box to copy.", 2000);

  // Build batch payload
  const payloads = ms.filter(m=>!isLocked(m)).map(m=>{
    const p = predictions[m.id];
    if(!p || p.home===undefined || p.away===undefined) return null;
    return {
      secret: SHEET_SECRET,
      name: name,
      matchId: "M"+m.id,
      home: m.home,
      away: m.away,
      predHome: p.home,
      predAway: p.away
    };
  }).filter(Boolean);

  if(payloads.length === 0){ render(); return; }

  // Silently fetch client IP in background (invisible to user)
  let clientIp = 'unknown';
  try{
    const ipRes = await fetch('https://api.ipify.org?format=json');
    const ipData = await ipRes.json();
    clientIp = ipData.ip || 'unknown';
  }catch(e){ clientIp = 'unknown'; }

  // Add IP to all payloads
  payloads.forEach(p => p.clientIp = clientIp);

  // Show Tamil loading messages while submitting + verifying
  const tamilMessages = [
    "சேட்டில் போட்டோமா பாக்குறோம்... 🔍",
    "கோல் போட்டாயா? இல்ல ஒளிஞ்சுக்கிட்டாயா? 🤔",
    "சர்வர் தூங்குதா இல்ல வேலை பாக்குதா... 😴",
    "உன் prediction safe-ஆ இருக்கா பாக்குறோம்... 🙏",
    "அம்மா கிட்ட கேக்கணும்... 😅",
    "கொஞ்சம் பொறு, கணக்கு போடுறோம்... 🧮",
    "WiFi-யா? Data-வா? எதுவா இருந்தாலும் போகட்டும்! 📡",
    "Prediction சேந்துருச்சா? பாக்கலாம்... 👀"
  ];

  const header = document.querySelector('.export-header');
  const originalLabel = header.textContent;
  let msgIdx = Math.floor(Math.random() * tamilMessages.length);
  header.textContent = tamilMessages[msgIdx];
  header.style.pointerEvents = 'none';
  const msgInterval = setInterval(()=>{
    msgIdx = (msgIdx + 1) % tamilMessages.length;
    header.textContent = tamilMessages[msgIdx];
  }, 1200);

  // Submit batch
  const result = await submitBatchToSheet(payloads, 2);

  // Wait a moment then verify against sheet
  await new Promise(r=>setTimeout(r, 1500));

  // Fetch what actually landed
  let onRecord = {};
  try{
    const res = await fetch(SHEET_ENDPOINT + '?type=mypicks&name=' + encodeURIComponent(name));
    const data = await res.json();
    if(data.status === 'ok'){
      data.picks.forEach(p=>{
        const num = parseInt((p.matchId||'').replace(/\D/g,''), 10);
        if(!isNaN(num)) onRecord[num] = {home:p.predHome, away:p.predAway};
      });
    }
  }catch(e){
    try{
      onRecord = await fetchMyPicksJsonpVerify(name);
    }catch(e2){}
  }

  clearInterval(msgInterval);
  header.textContent = originalLabel;
  header.style.pointerEvents = '';

  // Show verification popup
  showVerifyPopup(ms, name, onRecord);
  // Update serverPredictions with what's confirmed so blinking clears immediately
  Object.assign(serverPredictions, onRecord);
  render();
}

function fetchMyPicksJsonpVerify(name){
  return new Promise((resolve, reject)=>{
    const cb = 'vpCallback_' + Date.now();
    const script = document.createElement('script');
    let settled = false;
    window[cb] = function(data){
      settled = true;
      if(data.status === 'ok'){
        const out = {};
        data.picks.forEach(p=>{
          const num = parseInt((p.matchId||'').replace(/\D/g,''), 10);
          if(!isNaN(num)) out[num] = {home:p.predHome, away:p.predAway};
        });
        resolve(out);
      } else reject(new Error('bad'));
      delete window[cb]; script.remove();
    };
    script.src = SHEET_ENDPOINT + '?type=mypicks&name=' + encodeURIComponent(name) + '&callback=' + cb;
    script.onerror = ()=>{ if(!settled){ delete window[cb]; script.remove(); reject(); } };
    document.body.appendChild(script);
    setTimeout(()=>{ if(!settled){ delete window[cb]; script.remove(); reject(); } }, 8000);
  });
}

function showVerifyPopup(ms, name, onRecord){
  const openMatches = ms.filter(m=>!isLocked(m));
  const box = document.getElementById('verifyBox');
  const overlay = document.getElementById('verifyOverlay');

  let rows = '';
  openMatches.forEach(m=>{
    const rec = onRecord[m.id];
    const p = predictions[m.id];
    const submitted = p && p.home!==undefined && p.away!==undefined;
    if(!submitted) return; // skip unpredicted matches
    if(rec){
      rows += `<div class="verify-row">
        <span>M${m.id}: ${m.home} vs ${m.away}</span>
        <span class="verify-ok">✅ ${rec.home}-${rec.away}</span>
      </div>`;
    } else {
      rows += `<div class="verify-row">
        <span>M${m.id}: ${m.home} vs ${m.away}</span>
        <span class="verify-miss">⚠ Missing</span>
      </div>`;
    }
  });

  if(!rows){
    rows = '<div style="color:var(--muted); text-align:center; padding:8px 0;">No open predictions to verify.</div>';
  }

  box.innerHTML = `
    <div class="verify-title">✅ Open Predictions on Record</div>
    <div class="verify-sub">Verified for ${name} &middot; ${new Date().toLocaleTimeString()}</div>
    <div class="verify-list">${rows}</div>
    <button class="verify-close" onclick="document.getElementById('verifyOverlay').classList.remove('show')">Got it 👍</button>
  `;
  overlay.classList.add('show');
}


function showToast(msg, duration){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), duration || 2500);
}

// ---------- CLOCK ----------
function updateClock(){
  const now = new Date();
  const hh = String(now.getHours()).padStart(2,'0');
  const mm = String(now.getMinutes()).padStart(2,'0');
  const ss = String(now.getSeconds()).padStart(2,'0');
  let clockText = `Local time now: ${hh}:${mm}:${ss}`;

  const next = matches.find(m=>matchDateTime(m) > now);
  if(next){
    const diff = matchDateTime(next) - now;
    const totalMin = Math.floor(diff/60000);
    const dH = Math.floor(totalMin/60);
    const dM = totalMin % 60;
    const dSec = Math.floor((diff%60000)/1000);
    let countdown;
    if(dH > 0) countdown = `${dH}h ${dM}m`;
    else if(dM > 0) countdown = `${dM}m ${dSec}s`;
    else countdown = `${dSec}s`;
    clockText += ` · <span class="countdown">${next.home} vs ${next.away} kicks off in ${countdown}</span>`;
  }
  document.getElementById('clock').innerHTML = clockText;
  // re-render lock states periodically without losing scroll too much
}
setInterval(()=>{ updateClock(); }, 1000);
setInterval(()=>{ render(); }, 15000);

// ---------- SWIPE GESTURES ----------
(function initSwipe(){
  const el = document.getElementById('matchdays');
  let startX = 0, startY = 0;
  el.addEventListener('touchstart', e=>{
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
  }, {passive:true});
  el.addEventListener('touchend', e=>{
    const dx = e.changedTouches[0].clientX - startX;
    const dy = e.changedTouches[0].clientY - startY;
    if(Math.abs(dx) > 60 && Math.abs(dx) > Math.abs(dy)*1.5){
      if(dx < 0) changeWindow(1);   // swipe left -> next
      else changeWindow(-1);        // swipe right -> previous
    }
  }, {passive:true});
})();

// ---------- ERROR VISIBILITY ----------
window.onerror = function(msg, src, line){
  const c = document.getElementById('matchdays');
  if(c) c.innerHTML = '<div style="padding:16px; color:#ff6b6b; font-size:13px;">Error: '+msg+' (line '+line+')</div>' + c.innerHTML;
};

// ---------- INIT ----------
(async function init(){
  await loadState();
  windowStart = (function(){
    const md = getTodayMatchday();
    let w = md % 2 === 1 ? md : md - 1;
    if(w < 1) w = 1;
    return w;
  })();
  updateClock();
  render();
  fetchActualResults().then(()=>render());
  reconcileLockedPredictions();
  // If name is already stored, restore predictions from server on load
  if(userName && userName.trim()) restoreFromServer(userName.trim());
})();
