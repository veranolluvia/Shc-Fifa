<style>

  h1{font-size:18px; margin:0; font-weight:700;}
  .subtitle{font-size:12px; color:var(--muted); margin-top:2px;}
  .nav{
    display:flex; align-items:center; justify-content:space-between;
    margin:8px 0 14px; gap:8px;
  }
  .nav button{
    background:var(--accent); color:var(--bg); border:none;
    border-radius:12px; padding:12px 18px; font-size:20px; font-weight:800; min-width:50px;
    box-shadow:0 2px 6px rgba(0,217,126,0.35);
  }
  .nav button:disabled{opacity:0.25; box-shadow:none;}
  .nav .label{font-size:15px; font-weight:700; color:var(--text); text-align:center; flex:1; letter-spacing:0.3px;}
  .matchday{
    background:var(--card); border:1px solid var(--line); border-radius:14px;
    margin-bottom:12px; overflow:hidden;
  }
  .md-head{
    padding:10px 14px; font-weight:700; font-size:14px;
    background:var(--card2); display:flex; justify-content:space-between; align-items:center;
  }
  .md-head .badge{
    font-size:11px; font-weight:600; color:var(--bg); background:var(--accent);
    padding:2px 8px; border-radius:8px;
  }
  .match{
    padding:12px 14px; border-top:1px solid var(--line);
  }
  .match-row{
    display:flex; justify-content:space-between; align-items:center; cursor:pointer;
  }
  .teams{font-size:16.5px; font-weight:700;}
  .meta{font-size:12.5px; color:var(--muted); margin-top:3px; font-weight:500;}
  .status{
    font-size:11.5px; font-weight:800; padding:4px 9px; border-radius:8px; white-space:nowrap; margin-left:8px;
  }
  .status.open{background:rgba(61,220,151,0.15); color:var(--green);}
  .status.locked{background:rgba(255,107,107,0.15); color:var(--red);}
  .detail{display:none; margin-top:10px;}
  .detail.show{display:block;}
  .info-box{
    background:var(--bg); border:1px solid var(--line); border-radius:10px;
    padding:10px; margin-bottom:10px; font-size:12.5px; color:var(--muted); line-height:1.5;
  }
  .info-box b{color:var(--text);}
  .pred-row{display:flex; align-items:center; gap:10px; justify-content:center; margin:10px 0;}
  .pred-row input{
    width:54px; height:48px; text-align:center; font-size:20px; font-weight:700;
    background:var(--bg); color:var(--text); border:2px solid var(--line); border-radius:10px;
    transition:border-color 0.2s;
  }
  .pred-row input.filled{ border-color:var(--accent); }
  .pred-row input:disabled{opacity:0.6;}
  .vs{font-size:13px; color:var(--muted);}
  .pred-team{font-size:12px; text-align:center; color:var(--muted); width:54px;}
  .actions{display:flex; gap:8px; margin-top:8px;}
  .actions button{
    flex:1; padding:10px; border-radius:10px; border:1px solid var(--line);
    background:var(--card2); color:var(--text); font-size:13px; font-weight:600;
  }
  .actions button.primary{background:var(--accent); color:var(--bg); border:none;}
  .actions button:disabled{opacity:0.4;}
  .saved-note{font-size:11px; color:var(--green); margin-top:6px; min-height:14px;}
  .topbar-actions{display:flex; gap:8px;}
  .topbar-actions button{
    background:var(--card2); border:1px solid var(--line); color:var(--text);
    border-radius:10px; padding:8px 10px; font-size:12px;
  }
  .name-bar{
    display:flex; gap:8px; align-items:center; margin-bottom:10px; font-size:12px; color:var(--muted);
  }
  .name-bar input{
    flex:1; background:var(--card2); border:1px solid var(--line); color:var(--text);
    border-radius:8px; padding:8px 10px; font-size:13px;
  }
  .export-box{
    background:var(--card); border:1px solid var(--line); border-radius:12px;
    padding:14px; margin-top:14px;
  }
  .export-header{
    background:var(--accent); color:var(--bg); font-weight:700; font-size:15px;
    text-align:center; padding:12px; border-radius:10px; cursor:pointer;
    transition:background 0.15s, transform 0.05s;
  }
  .export-header:active{ background:#00b56a; transform:scale(0.99); }
  .export-header.shake{ animation: shake 0.4s; background:var(--accent2); color:#fff; }
  @keyframes shake{
    0%,100%{transform:translateX(0);}
    20%{transform:translateX(-6px);}
    40%{transform:translateX(6px);}
    60%{transform:translateX(-4px);}
    80%{transform:translateX(4px);}
  }

  .export-box textarea{

  .toast{

    padding:8px 16px; border-radius:20px; font-size:12px; opacity:0; transition:opacity 0.3s;
    pointer-events:none; z-index:50;
  }
  .toast.show{opacity:1;}
  .countdown{
    font-weight:800; animation: fifa-blink 3s ease-in-out infinite, fifa-color 8s linear infinite;
  }
  @keyframes fifa-blink{
    0%, 100%{ opacity:1; }
    50%{ opacity:0.3; }
  }
  @keyframes fifa-color{
    0%{ color:#00d97e; }
    33%{ color:#4dabf7; }
    66%{ color:#ff5e3a; }
    100%{ color:#00d97e; }
  }
  .lb-toggle{
    width:100%; margin:0 0 14px; background:var(--card2); color:var(--text);
    border:1px solid var(--line); border-radius:12px; padding:12px; font-size:14px; font-weight:700;
  }
  .action-row{
    display:flex; gap:6px; margin:0 0 14px;
  }
  .action-btn{
    flex:1; background:var(--card2); color:var(--text); border:1px solid var(--line);
    border-radius:12px; padding:10px 4px; font-size:12px; font-weight:700;
    text-align:center; display:flex; align-items:center; justify-content:center;
    white-space:nowrap;
  }
  .action-btn:active{ background:var(--line); }

  /* ---------- Action animations overlay ---------- */
  .anim-overlay{
    position:fixed; inset:0; z-index:200; display:none;
    align-items:center; justify-content:center; pointer-events:none;
    background:rgba(5,15,29,0.35);
  }
  .anim-overlay.show{ display:flex; }
  .anim-dice{
    font-size:64px; animation: dice-roll 0.7s ease-in-out;
  }
  @keyframes dice-roll{
    0%{ transform:rotate(0deg) scale(0.5); opacity:0; }
    30%{ transform:rotate(180deg) scale(1.2); opacity:1; }
    60%{ transform:rotate(380deg) scale(1); }
    100%{ transform:rotate(720deg) scale(0.8); opacity:0; }
  }
  .anim-thread{
    width:80%; height:4px; background:var(--accent); border-radius:2px;
    transform-origin:left center; animation: thread-pull 0.7s ease-in-out;
    box-shadow:0 0 12px var(--accent);
  }
  @keyframes thread-pull{
    0%{ transform:scaleX(0); opacity:0; }
    50%{ transform:scaleX(1); opacity:1; }
    100%{ transform:scaleX(1) translateX(20%); opacity:0; }
  }
  .anim-trophy{
    font-size:64px; animation: trophy-spin 0.7s ease-in-out;
  }
  @keyframes trophy-spin{
    0%{ transform:rotateY(0deg) scale(0.6); opacity:0; }
    40%{ transform:rotateY(360deg) scale(1.2); opacity:1; }
    100%{ transform:rotateY(720deg) scale(0.8); opacity:0; }

// Simple host/venue + head-to-head style context (general, illustrative)
function getStats(m){
  const venues = {
    "A":"Estadio Azteca, Mexico City", "B":"BMO Field, Toronto", "C":"Lincoln Financial Field, Philadelphia",
    "D":"Levi's Stadium, San Francisco Bay Area", "E":"AT&T Stadium, Dallas", "F":"Mercedes-Benz Stadium, Atlanta",
    "G":"Hard Rock Stadium, Miami", "H":"SoFi Stadium, Los Angeles", "I":"Lumen Field, Seattle",
    "J":"NRG Stadium, Houston", "K":"Gillette Stadium, Boston", "L":"MetLife Stadium, New York/New Jersey"
  };
  return {
    venue: venues[m.group] || "TBD Stadium, USA/Canada/Mexico",
    h2h: "Limited recent head-to-head data — both sides will be assessing each other from qualifying form and recent friendlies.",
    fact: facts[m.id] || "A fresh World Cup matchup with everything to play for."
  };
}

// ---------- STATE ----------
let predictions = {}; // {matchId: {home, away, submitted, submittedAt}}
let openDetails = new Set();
let userName = "";
let windowStart = 1; // matchday index that starts the visible 2-day window
const TOTAL_MD = 17;

// ---------- STORAGE ----------
// Hosted version: use localStorage so predictions persist on each user's device/browser.
const storage = {
  async get(key){
    const v = localStorage.getItem(key);
    return v===null ? null : {key, value: v};
  },
  async set(key, value){
    localStorage.setItem(key, value);
    return {key, value};
  }
};
async function loadState(){
  try{
    const r = await storage.get('predictions', false);
    predictions = r ? JSON.parse(r.value) : {};
  }catch(e){ predictions = {}; }
  try{
    const r2 = await storage.get('userName', false);
    userName = r2 ? JSON.parse(r2.value) : "";
  }catch(e){ userName = ""; }
  document.getElementById('userName').value = userName;
}
async function savePredictions(){
  try{ await storage.set('predictions', JSON.stringify(predictions), false); }catch(e){}
}
async function saveName(){
  userName = document.getElementById('userName').value;
  document.getElementById('userName').classList.remove('missing');
  try{ await storage.set('userName', JSON.stringify(userName), false); }catch(e){}
}

// ---------- TIME HELPERS ----------
// Source schedule times are in CEST (UTC+2). Convert to true UTC instants by subtracting 2 hours.
function nowUTC(){ return new Date(); }
function matchDateTime(m){
  const utcMs = Date.parse(m.date + "T" + m.time + ":00Z") - (2 * 60 * 60 * 1000);
  return new Date(utcMs);
}
function isLocked(m){
  return nowUTC() >= matchDateTime(m);
}
function fmtTime(m){
  const d = matchDateTime(m);
  // Display in the viewer's local timezone
  const hh = String(d.getHours()).padStart(2,'0');
  const mm = String(d.getMinutes()).padStart(2,'0');
  const day = d.toLocaleDateString('en-GB', {weekday:'short', day:'2-digit', month:'short'});
  const tzName = Intl.DateTimeFormat(undefined, {timeZoneName:'short'}).formatToParts(d).find(p=>p.type==='timeZoneName').value;
  return `${day}, ${hh}:${mm} ${tzName}`;
}

// ---------- MATCHDAY DETECTION ----------
function getTodayMatchday(){
  const today = new Date();
  const todayStr = today.getUTCFullYear()+"-"+String(today.getUTCMonth()+1).padStart(2,'0')+"-"+String(today.getUTCDate()).padStart(2,'0');
  let md = matches.find(m=>m.date===todayStr);
  if(md) return md.md;
  // find closest upcoming
  let upcoming = matches.filter(m=>m.date>=todayStr);
  if(upcoming.length) return upcoming[0].md;
  return TOTAL_MD;
}

// ---------- RENDER ----------
function getMatchesForMD(md){ return matches.filter(m=>m.md===md); }
function mdLabel(md){
  const ms = getMatchesForMD(md);
  if(!ms.length) return `Match Day ${md}`;
  const d = new Date(ms[0].date + "T00:00:00Z");
  const dateStr = d.toLocaleDateString('en-GB', {weekday:'long', day:'2-digit', month:'short', timeZone:'UTC'});
  return `Match Day ${md} — ${dateStr}`;
}

function render(){
  // clamp window
  if(windowStart < 1) windowStart = 1;
  if(windowStart > TOTAL_MD - 1) windowStart = TOTAL_MD - 1;
  document.getElementById('prevBtn').disabled = windowStart <= 1;
  document.getElementById('nextBtn').disabled = windowStart >= TOTAL_MD - 1;

  const mds = [windowStart, windowStart+1].filter(md=>md<=TOTAL_MD);
  document.getElementById('windowLabel').textContent = mds.map(md=>`Match Day ${md}`).join("   /   ");

  const container = document.getElementById('matchdays');
  container.innerHTML = "";

  mds.forEach(md=>{
    const block = document.createElement('div');
    block.className = 'matchday';
    const todayMd = getTodayMatchday();
    block.innerHTML = `<div class="md-head"><span>${mdLabel(md)}</span>${md===todayMd ? '<span class="badge">TODAY</span>' : ''}</div>`;

    getMatchesForMD(md).forEach(m=>{
      const locked = isLocked(m);
      const p = predictions[m.id] || {};
      let statusClass = locked ? 'locked' : 'open';
      let statusText = locked ? 'Locked' : 'Open';

      const stats = getStats(m);

      const matchDiv = document.createElement('div');
      matchDiv.className = 'match';
      matchDiv.innerHTML = `
        <div class="match-row" onclick="toggleDetail(${m.id})">
          <div>
            <div class="teams">M${m.id}: ${m.home} vs ${m.away}</div>
            <div class="meta">Group ${m.group} &middot; ${fmtTime(m)}${p.home!==undefined && p.away!==undefined ? ` &middot; Prediction: ${p.home}-${p.away}` : ''}</div>
          </div>
          <div class="status ${statusClass}">${statusText}</div>
        </div>
        <div class="detail${openDetails.has(m.id) ? ' show' : ''}" id="detail-${m.id}" onclick="event.stopPropagation()">
          <div class="info-box">
            <div><b>Venue:</b> ${stats.venue}</div>
            <div style="margin-top:4px;"><b>Head-to-head:</b> ${stats.h2h}</div>
            <div style="margin-top:4px;"><b>Talking point:</b> ${stats.fact}${m.note ? ' ('+m.note+')' : ''}</div>
            ${openFactCache[m.id] ? `<div style="margin-top:4px;">${openFactCache[m.id]}</div>` : ''}
          </div>
          <div class="pred-row" onclick="event.stopPropagation()">
            <div class="pred-team">${m.home}</div>
            <input type="number" inputmode="numeric" pattern="[0-9]*" min="0" max="20" id="home-${m.id}" class="${p.home!==undefined?'filled':''}" value="${p.home!==undefined?p.home:''}" ${locked?'disabled':''} oninput="markFilled(${m.id})" onchange="updatePred(${m.id})">
            <div class="vs">:</div>
            <input type="number" inputmode="numeric" pattern="[0-9]*" min="0" max="20" id="away-${m.id}" class="${p.away!==undefined?'filled':''}" value="${p.away!==undefined?p.away:''}" ${locked?'disabled':''} oninput="markFilled(${m.id})" onchange="updatePred(${m.id})">
            <div class="pred-team">${m.away}</div>
          </div>
          <div class="saved-note" id="note-${m.id}"></div>
        </div>
      `;
      block.appendChild(matchDiv);
    });
    container.appendChild(block);
  });
}

function toggleDetail(id){

  } else {

  }
  render();

function markFilled(id){
  const h = document.getElementById('home-'+id);
  const a = document.getElementById('away-'+id);
  h.classList.toggle('filled', h.value !== '');

// ---------- BUTTON ANIMATIONS ----------
function playAnimThen(type, action){
  const overlay = document.getElementById('animOverlay');
  let inner = '';
  if(type === 'dice') inner = '<div class="anim-dice">🎲</div>';
  else if(type === 'thread') inner = '<div class="anim-thread"></div>';
  else if(type === 'trophy') inner = '<div class="anim-trophy">🏆</div>';

  overlay.innerHTML = inner;
  overlay.classList.add('show');

  setTimeout(()=>{
    overlay.classList.remove('show');
    overlay.innerHTML = '';
    action();
  }, 700);
}

function goToLeaderboard(){
  window.location.href = 'leaderboard.html';
}

function surpriseMe(){
  const ms = visibleMatches().filter(m=>!isLocked(m) && predictions[m.id]===undefined);
  if(!ms.length){
    showToast("Nothing left to surprise you with here!");
    return;
  }
  // weighted plausible scoreline pool (mostly low-scoring, occasional thriller)
  const pool = [
    [1,0],[0,0],[1,1],[2,0],[2,1],[0,1],[1,2],[2,2],[3,1],[1,3],[0,2],[3,0],[3,2],[2,3],[4,1]
  ];
  ms.forEach(m=>{
    const [h,a] = pool[Math.floor(Math.random()*pool.length)];
    predictions[m.id] = {home:h, away:a};
  });
  savePredictions();
  showToast("🎲 Surprise predictions added!");
  render();
}

function updatePred(id){
  const h = document.getElementById('home-'+id).value;
  const a = document.getElementById('away-'+id).value;
  if(h==='' && a===''){ delete predictions[id]; }
  else{
    predictions[id] = predictions[id] || {};
    predictions[id].home = h===''?0:parseInt(h);
    predictions[id].away = a===''?0:parseInt(a);
  }
  savePredictions();
  const note = document.getElementById('note-'+id);
  if(note){ note.textContent = "Saved."; setTimeout(()=>{ if(note) note.textContent=''; }, 1500); }
  render();
}

function changeWindow(dir){
  windowStart += dir*2;
  render();
}
function goToday(){
  const md = getTodayMatchday();
  windowStart = md % 2 === 1 ? md : md - 1;
  if(windowStart < 1) windowStart = 1;
  render();
}

// ---------- EXPORT ----------
function visibleMatches(){
  const mds = [windowStart, windowStart+1].filter(md=>md<=TOTAL_MD);
  return matches.filter(m=>mds.includes(m.md));
}

function generateExport(){
  const ms = visibleMatches();
  const name = userName || "Player";
  let lines = [];
  lines.push(`*World Cup Predictions - ${name}*`);
  let currentMd = null;
  ms.forEach(m=>{
    if(m.md !== currentMd){
      currentMd = m.md;
      lines.push("");
      lines.push(`_${mdLabel(m.md)}_`);
    }
    const p = predictions[m.id];
    const predStr = (p && p.home!==undefined && p.away!==undefined) ? `${p.home} - ${p.away}` : "No prediction";
    lines.push(`M${m.id}: ${m.home} vs ${m.away}: ${predStr}`);
  });
  document.getElementById('exportText').value = lines.join("\n");
}

// ---------- SHARED SHEET SUBMISSION ----------
const SHEET_ENDPOINT = "https://script.google.com/macros/s/AKfycbxC_Xsx_0ffVWpJRZOLXIS0Kr6H9MST4QMw8wBEuGJSifTebg22Qpl4SDsX4BMexM8/exec";

function submitPredictionsToSheet(ms, name){
  ms.filter(m=>!isLocked(m)).forEach(m=>{
    const p = predictions[m.id];
    if(!p || p.home===undefined || p.away===undefined) return; // skip unpredicted matches
    const payload = {
      name: name,
      matchId: "M"+m.id,
      home: m.home,
      away: m.away,
      predHome: p.home,
      predAway: p.away
    };
    fetch(SHEET_ENDPOINT, {
      method: 'POST',
      headers: {'Content-Type': 'text/plain;charset=utf-8'},
      body: JSON.stringify(payload)
    }).catch(()=>{ /* fail silently, copy still works */ });
  });
}

// ---------- MY SUBMITTED PICKS ----------
async function loadMyPicks(){
  const box = document.getElementById('myPicksBox');
  if(!userName || !userName.trim()){
    box.innerHTML = '<div style="font-size:12px; color:var(--accent2); text-align:center;">Enter your name first.</div>';
    return;
  }
  box.innerHTML = '<div style="font-size:12px; color:var(--muted); text-align:center;">Loading...</div>';

  try{
    const res = await fetch(SHEET_ENDPOINT + '?type=mypicks&name=' + encodeURIComponent(userName.trim()));
    const data = await res.json();
    if(data.status === 'ok'){
      renderMyPicks(data);
      return;
    }
  }catch(e){
    // fall through to JSONP
  }

  try{
    await loadMyPicksJsonp();
  }catch(e2){
    box.innerHTML = '<div style="font-size:12px; color:var(--accent2); text-align:center;">Could not load your picks. Try again.</div>';
  }
}

function loadMyPicksJsonp(){
  return new Promise((resolve, reject)=>{
    const callbackName = 'mpCallback_' + Date.now();
    const script = document.createElement('script');
    let settled = false;

    window[callbackName] = function(data){
      settled = true;
      if(data.status === 'ok'){
        renderMyPicks(data);
        resolve();
      } else {
        reject(new Error('bad response'));
      }
      delete window[callbackName];
      script.remove();
    };

    script.src = SHEET_ENDPOINT + '?type=mypicks&name=' + encodeURIComponent(userName.trim()) + '&callback=' + callbackName;
    script.onerror = function(){
      if(!settled){
        delete window[callbackName];
        script.remove();
        reject(new Error('script load failed'));
      }
    };
    document.body.appendChild(script);

    setTimeout(()=>{
      if(!settled){
        delete window[callbackName];
        script.remove();
        reject(new Error('timeout'));
      }
    }, 8000);
  });
}

function renderMyPicks(data){
  const box = document.getElementById('myPicksBox');
  if(!data.picks || data.picks.length === 0){
    box.innerHTML = `<div style="font-size:12px; color:var(--muted); text-align:center;">No submitted picks found for "${data.name}" yet.</div>`;
    return;
  }
  const sorted = data.picks.slice().sort((a,b)=>{
    const an = parseInt((a.matchId||'').replace(/\D/g,''))||0;
    const bn = parseInt((b.matchId||'').replace(/\D/g,''))||0;
    return an - bn;
  });
  let html = `<div style="font-size:12px; color:var(--accent); text-align:center; margin-bottom:6px; font-weight:700;">On record for ${data.name}:</div>`;
  html += '<div style="font-size:12.5px; color:var(--text); line-height:1.8;">';
  sorted.forEach(p=>{
    const m = matches.find(mm=>"M"+mm.id === p.matchId);
    const label = m ? `${p.matchId}: ${m.home} vs ${m.away}` : p.matchId;
    html += `${label} &rarr; <b>${p.predHome} - ${p.predAway}</b><br>`;
  });
  html += '</div>';
  box.innerHTML = html;
}

async function confirmExport(){
  if(!userName || !userName.trim()){
    const nameInput = document.getElementById('userName');
    const header = document.querySelector('.export-header');
    nameInput.classList.add('missing');
    nameInput.placeholder = "Enter your name first";
    nameInput.focus();
    header.classList.add('shake');
    setTimeout(()=>header.classList.remove('shake'), 400);
    showToast("Please enter your name before composing.");
    return;
  }
  const ms = visibleMatches();
  const ts = new Date().toISOString().replace('T',' ').slice(0,19) + " UTC";

  // regenerate export text with confirmation timestamp
  const name = userName || "Player";
  let lines = [];
  lines.push(`*World Cup Predictions - ${name}*`);
  lines.push(`_Confirmed at: ${ts}_`);
  let currentMd = null;
  ms.filter(m=>!isLocked(m)).forEach(m=>{
    if(m.md !== currentMd){
      currentMd = m.md;
      lines.push("");
      lines.push(`_${mdLabel(m.md)}_`);
    }
    const p = predictions[m.id];
    const predStr = (p && p.home!==undefined && p.away!==undefined) ? `${p.home} - ${p.away}` : "No prediction";
    lines.push(`M${m.id}: ${m.home} vs ${m.away}: ${predStr}`);
  });
  const text = lines.join("\n") + "\n\n" + randomClosingLine();
  document.getElementById('exportText').value = text;

  // submit predictions to shared sheet in the background (does not block copy)
  submitPredictionsToSheet(ms, name);

  // try clipboard
  let copied = false;
  try{
    await navigator.clipboard.writeText(text);
    copied = true;
  }catch(e){
    try{
      const ta = document.getElementById('exportText');
      ta.removeAttribute('readonly');
      ta.focus();
      ta.select();
      copied = document.execCommand('copy');
      ta.setAttribute('readonly', 'readonly');
      ta.blur();
    }catch(e2){ copied = false; }
  }
  showToast(copied ? "Copied to clipboard!" : "Tap and hold the box to copy.");
  render();
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2500);
}

// ---------- CLOCK ----------
function updateClock(){
  const now = new Date();
  const hh = String(now.getHours()).padStart(2,'0');
  const mm = String(now.getMinutes()).padStart(2,'0');
  const ss = String(now.getSeconds()).padStart(2,'0');
  let clockText = `Local time now: ${hh}:${mm}:${ss}`;

  const next = matches.find(m=>matchDateTime(m) > now);
  if(next){
    const diff = matchDateTime(next) - now;
    const totalMin = Math.floor(diff/60000);
    const dH = Math.floor(totalMin/60);
    const dM = totalMin % 60;
    const dSec = Math.floor((diff%60000)/1000);
    let countdown;
    if(dH > 0) countdown = `${dH}h ${dM}m`;
    else if(dM > 0) countdown = `${dM}m ${dSec}s`;
    else countdown = `${dSec}s`;
    clockText += ` · <span class="countdown">${next.home} vs ${next.away} kicks off in ${countdown}</span>`;
  }
  document.getElementById('clock').innerHTML = clockText;
  // re-render lock states periodically without losing scroll too much
}
setInterval(()=>{ updateClock(); }, 1000);
setInterval(()=>{ render(); }, 15000);

// ---------- SWIPE GESTURES ----------
(function initSwipe(){
  const el = document.getElementById('matchdays');
  let startX = 0, startY = 0;
  el.addEventListener('touchstart', e=>{
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
  }, {passive:true});
  el.addEventListener('touchend', e=>{
    const dx = e.changedTouches[0].clientX - startX;
    const dy = e.changedTouches[0].clientY - startY;
    if(Math.abs(dx) > 60 && Math.abs(dx) > Math.abs(dy)*1.5){
      if(dx < 0) changeWindow(1);   // swipe left -> next
      else changeWindow(-1);        // swipe right -> previous
    }
  }, {passive:true});
})();

// ---------- ERROR VISIBILITY ----------
window.onerror = function(msg, src, line){
  const c = document.getElementById('matchdays');
  if(c) c.innerHTML = '<div style="padding:16px; color:#ff6b6b; font-size:13px;">Error: '+msg+' (line '+line+')</div>' + c.innerHTML;
};

// ---------- INIT ----------
(async function init(){
  await loadState();
  windowStart = (function(){
    const md = getTodayMatchday();
    let w = md % 2 === 1 ? md : md - 1;
    if(w < 1) w = 1;
    return w;
  })();
  updateClock();
  render();
})();
</script>
