<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SHC-1999-n · Prediction Map</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
  *{ box-sizing:border-box; margin:0; padding:0; }
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:#071a2b; color:#f2f7fb; min-height:100vh;
  }

  /* ---------- PASSCODE GATE ---------- */
  .gate{
    position:fixed; inset:0; z-index:9999;
    background:#071a2b; display:flex; align-items:center; justify-content:center;
  }
  .gate-box{
    background:#0f2940; border:2px solid #2d5577; border-radius:18px;
    padding:32px 28px; max-width:320px; width:90%; text-align:center;
    box-shadow:0 8px 32px rgba(0,0,0,0.5);
  }
  .gate-icon{ font-size:48px; margin-bottom:12px; }
  .gate-title{ font-size:18px; font-weight:800; color:#00d97e; margin-bottom:4px; }
  .gate-sub{ font-size:12px; color:#a9c4dc; margin-bottom:20px; }
  .gate-input{
    width:100%; padding:12px; font-size:18px; text-align:center; font-weight:700;
    background:#071a2b; color:#f2f7fb; border:2px solid #2d5577;
    border-radius:10px; outline:none; letter-spacing:4px;
    margin-bottom:12px;
  }
  .gate-input:focus{ border-color:#00d97e; }
  .gate-input.error{ border-color:#ff5e3a; animation:shake 0.3s ease; }
  @keyframes shake{
    0%,100%{ transform:translateX(0); }
    25%{ transform:translateX(-8px); }
    75%{ transform:translateX(8px); }
  }
  .gate-btn{
    width:100%; padding:12px; background:#00d97e; color:#071a2b;
    border:none; border-radius:10px; font-size:15px; font-weight:800;
    cursor:pointer;
  }
  .gate-error{ font-size:12px; color:#ff5e3a; margin-top:8px; min-height:16px; }
  .topbar{
    background:#0f2940; border-bottom:2px solid #00d97e;
    padding:10px 16px; display:flex; align-items:center;
    justify-content:space-between; position:sticky; top:0; z-index:1000;
  }
  .topbar-title{ font-size:15px; font-weight:800; color:#00d97e; }
  .topbar-sub{ font-size:11px; color:#a9c4dc; margin-top:1px; }
  .back-btn{
    background:#163a57; color:#a9c4dc; border:1px solid #2d5577;
    border-radius:8px; padding:7px 12px; font-size:12px; font-weight:600;
    text-decoration:none; display:inline-block;
  }
  .refresh-btn{
    background:#00d97e; color:#071a2b; border:none;
    border-radius:8px; padding:7px 12px; font-size:12px; font-weight:700;
    cursor:pointer;
  }
  #map{
    width:100%; height:calc(100vh - 54px - 120px);
    min-height:300px;
  }
  .panel{
    background:#0f2940; border-top:1px solid #2d5577;
    padding:10px 16px; max-height:160px; overflow-y:auto;
  }
  .panel-title{
    font-size:11px; font-weight:700; color:#a9c4dc; text-transform:uppercase;
    letter-spacing:0.5px; margin-bottom:8px;
  }
  .ip-list{ display:flex; flex-wrap:wrap; gap:6px; }
  .ip-chip{
    background:#163a57; border:1px solid #2d5577; border-radius:8px;
    padding:5px 10px; font-size:11.5px; cursor:pointer;
    transition:background 0.15s;
  }
  .ip-chip:hover{ background:#00d97e22; border-color:#00d97e; }
  .ip-chip .chip-name{ color:#00d97e; font-weight:700; }
  .ip-chip .chip-loc{ color:#a9c4dc; font-size:10px; }
  .loading{
    position:fixed; inset:0; background:rgba(7,26,43,0.85);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    z-index:2000; gap:12px;
  }
  .loading-text{ font-size:14px; color:#a9c4dc; }
  .loading-sub{ font-size:12px; color:#2d5577; }
  .spinner{
    width:36px; height:36px; border:3px solid #2d5577;
    border-top-color:#00d97e; border-radius:50%;
    animation:spin 0.8s linear infinite;
  }
  @keyframes spin{ to{ transform:rotate(360deg); } }
  .error-box{
    background:#1a0a0a; border:1px solid #ff5e3a; border-radius:12px;
    padding:16px; margin:20px; font-size:13px; color:#ff8866; text-align:center;
  }
  .status-bar{
    background:#0a1f35; padding:5px 16px; font-size:11px; color:#a9c4dc;
    border-bottom:1px solid #2d5577; display:flex; justify-content:space-between;
  }
</style>
</head>
<body>

<!-- PASSCODE GATE -->
<div class="gate" id="gate">
  <div class="gate-box">
    <div class="gate-icon">🗺️🔒</div>
    <div class="gate-title">Admin Access</div>
    <div class="gate-sub">SHC-1999-n Prediction Map<br>Enter passcode to continue</div>
    <input class="gate-input" id="gateInput" type="password"
      placeholder="••••••" maxlength="12"
      onkeydown="if(event.key==='Enter') checkPasscode()">
    <button class="gate-btn" onclick="checkPasscode()">Enter</button>
    <div class="gate-error" id="gateError"></div>
  </div>
</div>

<div class="topbar">
  <div>
    <div class="topbar-title">⚽ SHC Prediction Map</div>
    <div class="topbar-sub">Where are the predictors?</div>
  </div>
  <div style="display:flex; gap:8px; align-items:center;">
    <button class="refresh-btn" onclick="loadMap()">🔄 Refresh</button>
    <a href="index.html" class="back-btn">⬅ Predictions</a>
  </div>
</div>

<div class="status-bar">
  <span id="statusText">Loading...</span>
  <span id="lastUpdated"></span>
</div>

<div id="map"></div>

<div class="panel">
  <div class="panel-title">Players Located</div>
  <div class="ip-list" id="ipList"></div>
</div>

<div class="loading" id="loading">
  <div class="spinner"></div>
  <div class="loading-text">Fetching prediction locations...</div>
  <div class="loading-sub" id="loadingStep">Connecting to sheet...</div>
</div>

<script>
// ---- PASSCODE GATE ----
const PASSCODE = "shc1999map";

function checkPasscode(){
  const inp = document.getElementById('gateInput');
  const err = document.getElementById('gateError');
  if(inp.value === PASSCODE){
    // Store in sessionStorage so refresh doesn't re-prompt within same session
    sessionStorage.setItem('mapAccess','1');
    document.getElementById('gate').style.display = 'none';
    initMap();
  } else {
    inp.classList.add('error');
    err.textContent = 'Wrong passcode. Try again.';
    inp.value = '';
    setTimeout(()=>inp.classList.remove('error'), 400);
    setTimeout(()=>err.textContent='', 2000);
    inp.focus();
  }
}

// Check if already authenticated this session
window.addEventListener('DOMContentLoaded', ()=>{
  if(sessionStorage.getItem('mapAccess') === '1'){
    document.getElementById('gate').style.display = 'none';
    initMap();
  } else {
    document.getElementById('gateInput').focus();
  }
});

function initMap(){
  map = L.map('map', { zoomControl: true }).setView([20, 78], 4);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; OpenStreetMap contributors &copy; CARTO',
    maxZoom: 18
  }).addTo(map);
  loadMap();
}

const SHEET_ENDPOINT = "https://script.google.com/macros/s/AKfycbxC_Xsx_0ffVWpJRZOLXIS0Kr6H9MST4QMw8wBEuGJSifTebg22Qpl4SDsX4BMexM8/exec";

// Player colour map for markers
const PLAYER_COLORS = [
  '#00d97e','#ff5e3a','#4dabf7','#ffd166','#c77dff',
  '#f72585','#4cc9f0','#fb8500','#06d6a0','#ef233c',
  '#8338ec','#3a86ff','#ffbe0b','#ff006e','#8ac926'
];

let map = null;
let markers = [];
let playerColorMap = {};

function getPlayerColor(name) {
  if (!playerColorMap[name]) {
    const idx = Object.keys(playerColorMap).length % PLAYER_COLORS.length;
    playerColorMap[name] = PLAYER_COLORS[idx];
  }
  return playerColorMap[name];
}

function makeIcon(color, names) {
  const initials = names.map(n => n[0]).join('');
  return L.divIcon({
    className: '',
    html: `<div style="
      background:${color}; color:#071a2b; font-weight:800; font-size:11px;
      width:32px; height:32px; border-radius:50%; display:flex;
      align-items:center; justify-content:center;
      border:3px solid #fff; box-shadow:0 2px 8px rgba(0,0,0,0.4);
      white-space:nowrap;
    ">${initials.slice(0,3)}</div>`,
    iconSize: [32, 32],
    iconAnchor: [16, 16],
    popupAnchor: [0, -18]
  });
}

async function fetchIpLog() {
  // Try fetch first
  try {
    const res = await fetch(SHEET_ENDPOINT + '?type=iplog');
    const data = await res.json();
    if (data.status === 'ok') return data.ips;
  } catch(e) {}
  // JSONP fallback
  return await new Promise((resolve, reject) => {
    const cb = 'iplogCb_' + Date.now();
    const script = document.createElement('script');
    let settled = false;
    window[cb] = function(data) {
      settled = true;
      if (data.status === 'ok') resolve(data.ips);
      else reject(new Error('bad response'));
      delete window[cb]; script.remove();
    };
    script.src = SHEET_ENDPOINT + '?type=iplog&callback=' + cb;
    script.onerror = () => { if(!settled){ delete window[cb]; script.remove(); reject(); } };
    document.body.appendChild(script);
    setTimeout(() => { if(!settled){ delete window[cb]; script.remove(); reject(new Error('timeout')); } }, 10000);
  });
}

async function geolocateIPs(ipList) {
  // ip-api.com doesn't support HTTPS on free tier for batch
  // Use ipapi.co which supports HTTPS — one request per IP, max concurrency 5
  const results = await Promise.all(ipList.map(async item => {
    try {
      const res = await fetch(`https://ipapi.co/${item.ip}/json/`);
      const d = await res.json();
      if (d.error) return { status: 'fail', query: item.ip };
      return {
        status: 'success',
        query: item.ip,
        country: d.country_name,
        regionName: d.region,
        city: d.city,
        lat: d.latitude,
        lon: d.longitude,
        isp: d.org
      };
    } catch(e) {
      return { status: 'fail', query: item.ip };
    }
  }));
  return results;
}

async function loadMap() {
  document.getElementById('loading').style.display = 'flex';
  document.getElementById('loadingStep').textContent = 'Connecting to sheet...';

  // Clear existing markers
  markers.forEach(m => map.removeLayer(m));
  markers = [];
  document.getElementById('ipList').innerHTML = '';

  try {
    // Step 1: fetch IP log from sheet
    document.getElementById('loadingStep').textContent = 'Fetching prediction IPs...';
    const ipEntries = await fetchIpLog();

    if (!ipEntries || ipEntries.length === 0) {
      document.getElementById('statusText').textContent = 'No IP data found yet — submit predictions first.';
      document.getElementById('loading').style.display = 'none';
      return;
    }

    document.getElementById('loadingStep').textContent = `Geolocating ${ipEntries.length} unique IP(s)...`;

    // Step 2: geolocate all IPs
    const geoResults = await geolocateIPs(ipEntries);

    // Step 3: build a name lookup map
    const ipToNames = {};
    ipEntries.forEach(e => { ipToNames[e.ip] = e.names; });

    // Step 4: plot markers
    let located = 0;
    const chipHtml = [];
    const bounds = [];

    geoResults.forEach(geo => {
      if (geo.status !== 'success') return;
      const names = ipToNames[geo.query] || ipToNames[geo.query.trim()] || ['Unknown'];
      const color = getPlayerColor(names[0]);
      const label = names.join(' & ');
      const loc = `${geo.city}, ${geo.regionName}, ${geo.country}`;

      // Marker
      const icon = makeIcon(color, names);
      const marker = L.marker([geo.lat, geo.lon], { icon })
        .bindPopup(`
          <div style="font-family:sans-serif; min-width:160px;">
            <div style="font-weight:700; font-size:14px; margin-bottom:4px;">${label}</div>
            <div style="font-size:11px; color:#666;">${loc}</div>
            <div style="font-size:10px; color:#999; margin-top:3px;">ISP: ${geo.isp}</div>
            <div style="font-size:10px; color:#999;">IP: ${geo.query}</div>
          </div>
        `)
        .addTo(map);
      markers.push(marker);
      bounds.push([geo.lat, geo.lon]);
      located++;

      // Chip
      chipHtml.push(`
        <div class="ip-chip" onclick="focusMarker(${geo.lat},${geo.lon})">
          <span class="chip-name" style="color:${color}">${label}</span>
          <div class="chip-loc">${geo.city}, ${geo.country}</div>
        </div>
      `);
    });

    document.getElementById('ipList').innerHTML = chipHtml.join('');

    if (bounds.length > 0) {
      map.fitBounds(bounds, { padding: [40, 40], maxZoom: 10 });
    }

    document.getElementById('statusText').textContent =
      `${located} location(s) plotted from ${ipEntries.length} unique IP(s)`;
    document.getElementById('lastUpdated').textContent =
      'Updated: ' + new Date().toLocaleTimeString();

  } catch(err) {
    document.getElementById('statusText').textContent = 'Error: ' + (err.message || 'Could not load data');
    console.error(err);
  }

  document.getElementById('loading').style.display = 'none';
}

function focusMarker(lat, lon) {
  map.setView([lat, lon], 10, { animate: true });
  markers.forEach(m => {
    const ll = m.getLatLng();
    if (Math.abs(ll.lat - lat) < 0.01 && Math.abs(ll.lng - lon) < 0.01) {
      m.openPopup();
    }
  });
}
</script>
</body>
</html>
