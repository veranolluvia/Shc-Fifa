<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SHC Prediction Map</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #071a2b; color: #f2f7fb; min-height: 100vh; }
.bar { background: #0f2940; border-bottom: 2px solid #00d97e; padding: 10px 16px; display: flex; align-items: center; justify-content: space-between; }
.bar-title { font-size: 15px; font-weight: 800; color: #00d97e; }
.bar-sub { font-size: 11px; color: #a9c4dc; }
.btn-back { background: #163a57; color: #a9c4dc; border: 1px solid #2d5577; border-radius: 8px; padding: 7px 12px; font-size: 12px; text-decoration: none; }
.btn-refresh { background: #00d97e; color: #071a2b; border: none; border-radius: 8px; padding: 7px 12px; font-size: 12px; font-weight: 700; cursor: pointer; }
.btns { display: flex; gap: 8px; }
#map { width: 100%; height: 52vh; min-height: 260px; }
.status { background: #0a1f35; padding: 5px 16px; font-size: 11px; color: #a9c4dc; display: flex; justify-content: space-between; border-bottom: 1px solid #2d5577; }
.panel { background: #0f2940; border-top: 1px solid #2d5577; padding: 10px 16px; max-height: 220px; overflow-y: auto; }
.panel-title { font-size: 11px; font-weight: 700; color: #a9c4dc; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
.chips { display: flex; flex-direction: column; gap: 6px; }
.chip { background: #163a57; border: 1px solid #2d5577; border-radius: 10px; padding: 8px 12px; cursor: pointer; display: flex; align-items: center; justify-content: space-between; }
.chip:hover { border-color: #00d97e; }
.chip-left { display: flex; flex-direction: column; gap: 2px; }
.chip-name { font-weight: 700; font-size: 12.5px; }
.chip-ip { color: #a9c4dc; font-size: 10px; font-family: monospace; }
.chip-loc { color: #a9c4dc; font-size: 10.5px; }
.chip-right { display: flex; flex-direction: column; align-items: flex-end; gap: 2px; }
.chip-ping { font-size: 10px; color: #a9c4dc; }
.chip-btn { background: #00d97e22; border: 1px solid #00d97e44; border-radius: 6px; padding: 3px 8px; font-size: 10px; color: #00d97e; cursor: pointer; white-space: nowrap; }
.chip-btn.loading { color: #a9c4dc; border-color: #2d5577; background: transparent; }
.chip.located { border-color: #00d97e33; }
.chip.failed { border-color: #ff5e3a44; }
.overlay { position: fixed; inset: 0; background: rgba(7,26,43,0.88); display: flex; align-items: center; justify-content: center; z-index: 9999; }
.overlay-box { background: #0f2940; border: 2px solid #2d5577; border-radius: 16px; padding: 28px 24px; max-width: 300px; width: 90%; text-align: center; }
.overlay-icon { font-size: 44px; margin-bottom: 10px; }
.overlay-title { font-size: 17px; font-weight: 800; color: #00d97e; margin-bottom: 4px; }
.overlay-sub { font-size: 12px; color: #a9c4dc; margin-bottom: 18px; }
.gate-input { width: 100%; padding: 11px; font-size: 18px; text-align: center; font-weight: 700; background: #071a2b; color: #f2f7fb; border: 2px solid #2d5577; border-radius: 10px; outline: none; letter-spacing: 4px; margin-bottom: 10px; }
.gate-input:focus { border-color: #00d97e; }
.gate-input.err { border-color: #ff5e3a; }
.gate-btn { width: 100%; padding: 11px; background: #00d97e; color: #071a2b; border: none; border-radius: 10px; font-size: 14px; font-weight: 800; cursor: pointer; }
.gate-err { font-size: 12px; color: #ff5e3a; margin-top: 6px; min-height: 16px; }
</style>
</head>
<body>

<div class="overlay" id="gate">
  <div class="overlay-box">
    <div class="overlay-icon">🗺️</div>
    <div class="overlay-title">SHC Prediction Map</div>
    <div class="overlay-sub">Admin access only</div>
    <input class="gate-input" id="gateInput" type="password" placeholder="••••••" maxlength="16"
      onkeydown="if(event.key==='Enter')checkPass()">
    <button class="gate-btn" onclick="checkPass()">Enter</button>
    <div class="gate-err" id="gateErr"></div>
  </div>
</div>

<div class="bar">
  <div>
    <div class="bar-title">⚽ SHC Prediction Map</div>
    <div class="bar-sub">Tap a name to locate · cached instantly</div>
  </div>
  <div class="btns">
    <button class="btn-refresh" onclick="refreshIPList()">🔄 Sync IPs</button>
    <a href="index.html" class="btn-back">⬅ Back</a>
  </div>
</div>

<div class="status">
  <span id="statusText">Waiting...</span>
  <span id="statusTime"></span>
</div>

<div id="map"></div>

<div class="panel">
  <div class="panel-title">Players — tap to locate / re-ping</div>
  <div class="chips" id="chips"></div>
</div>

<script>
const PASS = "shc1999map";
const ENDPOINT = "https://script.google.com/macros/s/AKfycbxC_Xsx_0ffVWpJRZOLXIS0Kr6H9MST4QMw8wBEuGJSifTebg22Qpl4SDsX4BMexM8/exec";
const CACHE_KEY = "shcIpGeoCache";
const COLORS = ['#00d97e','#ff5e3a','#4dabf7','#ffd166','#c77dff','#f72585','#4cc9f0','#fb8500','#06d6a0','#ef233c','#8338ec','#3a86ff','#ffbe0b','#ff006e','#8ac926'];

let map, markers = {}, colorIdx = 0, playerColors = {}, ipEntries = [];

// ---- CACHE ----
function loadCache() {
  try { return JSON.parse(localStorage.getItem(CACHE_KEY) || '{}'); } catch(e) { return {}; }
}
function saveCache(cache) {
  try { localStorage.setItem(CACHE_KEY, JSON.stringify(cache)); } catch(e) {}
}

// ---- COLOUR ----
function col(name) {
  if (!playerColors[name]) playerColors[name] = COLORS[colorIdx++ % COLORS.length];
  return playerColors[name];
}

// ---- PASSCODE ----
function checkPass() {
  if (document.getElementById('gateInput').value === PASS) {
    sessionStorage.setItem('mapOk','1');
    document.getElementById('gate').style.display = 'none';
    startMap();
  } else {
    const inp = document.getElementById('gateInput');
    inp.classList.add('err'); inp.value = '';
    document.getElementById('gateErr').textContent = 'Wrong passcode';
    setTimeout(() => { inp.classList.remove('err'); document.getElementById('gateErr').textContent=''; }, 1500);
  }
}

// ---- MAP INIT ----
function startMap() {
  map = L.map('map').setView([20, 40], 3);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap contributors', maxZoom: 18
  }).addTo(map);
  refreshIPList();
}

// ---- FETCH IP LIST FROM SHEET ----
async function fetchIPs() {
  try {
    const r = await fetch(ENDPOINT + '?type=iplog');
    const d = await r.json();
    if (d.status === 'ok') return d.ips;
  } catch(e) {}
  return new Promise((res, rej) => {
    const cb = 'ipcb_' + Date.now(); const s = document.createElement('script'); let done = false;
    window[cb] = d => { done=true; if(d.status==='ok') res(d.ips); else rej(); delete window[cb]; s.remove(); };
    s.src = ENDPOINT + '?type=iplog&callback=' + cb;
    s.onerror = () => { if(!done){ delete window[cb]; s.remove(); rej(); } };
    document.body.appendChild(s);
    setTimeout(() => { if(!done){ delete window[cb]; s.remove(); rej(); } }, 10000);
  });
}

async function refreshIPList() {
  document.getElementById('statusText').textContent = 'Syncing IP list from sheet...';
  try {
    ipEntries = await fetchIPs();
  } catch(e) {
    document.getElementById('statusText').textContent = 'Could not reach sheet — using cached data';
    ipEntries = [];
  }

  // Merge with cached geo data and render chips
  const cache = loadCache();
  renderChips(ipEntries, cache);
  // Plot any already-cached locations
  plotCached(ipEntries, cache);

  const located = Object.keys(cache).length;
  document.getElementById('statusText').textContent = `${ipEntries.length} IP(s) found · ${located} located · tap name to ping`;
  document.getElementById('statusTime').textContent = new Date().toLocaleTimeString();
}

// ---- RENDER CHIPS ----
function renderChips(entries, cache) {
  const box = document.getElementById('chips');
  if (!entries.length) {
    box.innerHTML = '<div style="color:#a9c4dc;font-size:12px;">No IPs found yet — submit predictions first.</div>';
    return;
  }
  box.innerHTML = entries.map(entry => {
    const names = (entry.names || ['Unknown']).join(' & ');
    const c = col((entry.names||['?'])[0]);
    const geo = cache[entry.ip];
    const locText = geo ? `${geo.city||''}, ${geo.country||''}` : 'Not yet located';
    const pingText = geo ? `Last pinged: ${geo.pingedAt||'?'}` : '';
    const chipCls = geo ? 'chip located' : (geo===null ? 'chip failed' : 'chip');
    return `<div class="${chipCls}" id="chip-${entry.ip.replace(/\./g,'_')}">
      <div class="chip-left">
        <span class="chip-name" style="color:${c}">${names}</span>
        <span class="chip-ip">${entry.ip}</span>
        <span class="chip-loc">${locText}</span>
      </div>
      <div class="chip-right">
        <span class="chip-ping">${pingText}</span>
        <button class="chip-btn" onclick="pingOne('${entry.ip}',${JSON.stringify(entry.names||['?'])})" id="btn-${entry.ip.replace(/\./g,'_')}">
          ${geo ? '🔄 Re-ping' : '📍 Locate'}
        </button>
      </div>
    </div>`;
  }).join('');
}

// ---- PLOT CACHED LOCATIONS ----
function plotCached(entries, cache) {
  entries.forEach(entry => {
    const geo = cache[entry.ip];
    if (geo && geo.lat) plotMarker(entry.ip, entry.names||['?'], geo);
  });
  const bounds = Object.values(cache).filter(g=>g&&g.lat).map(g=>[g.lat,g.lon]);
  if (bounds.length > 0) map.fitBounds(bounds, { padding: [40,40], maxZoom: 8 });
}

// ---- GEO LOOKUP (single IP, with fallback) ----
async function geoIP(ip) {
  // Try ipapi.co
  try {
    const r = await fetch('https://ipapi.co/' + ip + '/json/');
    const d = await r.json();
    if (!d.error && d.latitude) return { lat: d.latitude, lon: d.longitude, city: d.city, country: d.country_name, isp: d.org };
  } catch(e) {}
  // Fallback: ipwho.is
  try {
    const r2 = await fetch('https://ipwho.is/' + ip);
    const d2 = await r2.json();
    if (d2.success && d2.latitude) return { lat: d2.latitude, lon: d2.longitude, city: d2.city, country: d2.country, isp: d2.connection?.isp||'' };
  } catch(e) {}
  return null;
}

// ---- PING ONE IP ----
async function pingOne(ip, names) {
  const safeIp = ip.replace(/\./g,'_');
  const btn = document.getElementById('btn-'+safeIp);
  const chip = document.getElementById('chip-'+safeIp);
  if (btn) { btn.textContent = '⏳ Pinging...'; btn.classList.add('loading'); btn.disabled = true; }

  const geo = await geoIP(ip);
  const cache = loadCache();

  if (geo) {
    geo.pingedAt = new Date().toLocaleTimeString();
    cache[ip] = geo;
    saveCache(cache);
    plotMarker(ip, names, geo);
    if (chip) chip.className = 'chip located';
    if (btn) { btn.textContent = '🔄 Re-ping'; btn.classList.remove('loading'); btn.disabled = false; }
    // Update location text
    const locEl = chip?.querySelector('.chip-loc');
    const pingEl = chip?.querySelector('.chip-ping');
    if (locEl) locEl.textContent = `${geo.city||''}, ${geo.country||''}`;
    if (pingEl) pingEl.textContent = `Last pinged: ${geo.pingedAt}`;
    // Fly to location
    map.flyTo([geo.lat, geo.lon], 8, { animate: true, duration: 1.2 });
    markers[ip]?.openPopup();
  } else {
    cache[ip] = null; // mark as failed so we know we tried
    saveCache(cache);
    if (chip) chip.className = 'chip failed';
    if (btn) { btn.textContent = '❌ Failed — retry'; btn.classList.remove('loading'); btn.disabled = false; }
  }

  document.getElementById('statusTime').textContent = new Date().toLocaleTimeString();
}

// ---- PLOT MARKER ----
function plotMarker(ip, names, geo) {
  // Remove existing marker for this IP if any
  if (markers[ip]) { map.removeLayer(markers[ip]); delete markers[ip]; }

  const label = names.join(' & ');
  const c = col(names[0]);
  const initials = names.map(n=>n[0]).slice(0,2).join('');

  const icon = L.divIcon({
    className: '',
    html: '<div style="background:'+c+';color:#071a2b;font-weight:800;font-size:11px;width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:3px solid white;box-shadow:0 2px 8px rgba(0,0,0,0.5);">'+initials+'</div>',
    iconSize: [34,34], iconAnchor: [17,17], popupAnchor: [0,-20]
  });

  const popup = '<b style="font-size:14px;">'+label+'</b><br>'
    +'<span style="font-size:11px;color:#555;">'+(geo.city||'')+', '+(geo.country||'')+'</span><br>'
    +'<span style="font-size:10px;color:#888;">'+(geo.isp||'')+'</span><br>'
    +'<span style="font-size:10px;color:#aaa;">'+ip+'</span><br>'
    +'<span style="font-size:10px;color:#aaa;">Pinged: '+(geo.pingedAt||'')+'</span>';

  markers[ip] = L.marker([geo.lat, geo.lon], { icon }).bindPopup(popup).addTo(map);
}

// ---- INIT ----
window.addEventListener('DOMContentLoaded', () => {
  if (sessionStorage.getItem('mapOk') === '1') {
    document.getElementById('gate').style.display = 'none';
    startMap();
  } else {
    setTimeout(() => document.getElementById('gateInput').focus(), 100);
  }
});
</script>
</body>
</html>
